<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSN/GCL Interactive Dashboard &mdash; KETI</title>
  <style>
    :root {
      --bg: #f8f9fa; --bg2: #f0f2f5;
      --card: #ffffff; --card-hi: #f8fafc;
      --border: rgba(59,130,246,0.2); --border-hi: rgba(59,130,246,0.4);
      --text: #1e293b; --text2: #475569; --text3: #64748b;
      --cyan: #0891b2; --blue: #3B82F6; --purple: #7c3aed;
      --orange: #d97706; --red: #dc2626; --green: #059669;
      --guard: #d97706; --be: #e2e8f0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5; color: var(--text);
      height: 100vh; overflow: hidden; display: flex; flex-direction: column;
    }

    /* ── Top Bar ── */
    .top-bar {
      background: rgba(255,255,255,0.97); border-bottom: 1px solid rgba(59,130,246,0.15);
      padding: 6px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      flex-shrink: 0; backdrop-filter: blur(12px); z-index: 10;
    }
    .top-bar .logo {
      display: flex; align-items: center; gap: 8px; margin-right: 8px;
    }
    .top-bar .logo img { height: 28px; width: auto; }
    .top-bar .logo h1 {
      font-size: 1rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #3B82F6 0%, #06B6D4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      white-space: nowrap;
    }
    .top-bar label {
      font-size: 0.82rem; font-weight: 600; color: var(--text2);
      display: flex; flex-direction: column; gap: 2px;
    }
    .top-bar input, .top-bar select {
      padding: 4px 7px; border-radius: 5px; border: 1px solid var(--border);
      font-size: 0.85rem; width: 75px;
    }
    .top-bar select { width: auto; min-width: 75px; }
    .top-bar input:focus, .top-bar select:focus {
      outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px rgba(59,130,246,0.12);
    }
    .tsep { width: 1px; height: 28px; background: rgba(59,130,246,0.15); flex-shrink: 0; }
    .fail-select { border-color: rgba(220,38,38,0.3) !important; }
    .btn-solve {
      padding: 6px 20px; font-size: 0.9rem; font-weight: 700;
      background: linear-gradient(135deg, #3B82F6 0%, #06B6D4 100%);
      color: #fff; border: none; border-radius: 6px; cursor: pointer;
      white-space: nowrap;
    }
    .btn-solve:hover { filter: brightness(1.1); }
    .btn-solve:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Status Bar ── */
    .status-bar {
      background: rgba(255,255,255,0.95); border-bottom: 1px solid rgba(59,130,246,0.1);
      padding: 6px 20px; font-size: 0.85rem; color: var(--text2); flex-shrink: 0;
      min-height: 30px; display: flex; align-items: center;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-sm {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(59,130,246,0.2); border-top-color: var(--blue);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 5px;
    }

    /* ── Split Layout ── */
    .split {
      flex: 1; display: flex; overflow: hidden; min-height: 0;
    }
    .pane {
      flex: 1; overflow-y: auto; padding: 10px;
      scrollbar-width: thin; scrollbar-color: rgba(59,130,246,0.2) transparent;
    }
    .pane::-webkit-scrollbar { width: 6px; }
    .pane::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.2); border-radius: 3px; }
    .pane-left { border-right: 1px solid rgba(59,130,246,0.12); }

    .pane-card {
      background: rgba(255,255,255,0.95); border: 1px solid rgba(59,130,246,0.12);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.03);
    }
    .pane-card:hover { border-color: rgba(59,130,246,0.25); }
    .pane-title {
      font-size: 0.88rem; font-weight: 800; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .pane-title::before {
      content: ''; width: 3px; height: 16px; border-radius: 2px; background: var(--blue);
    }

    /* ── Add/Remove Buttons ── */
    .btn-add, .btn-del {
      padding: 4px 14px; font-size: 0.8rem; font-weight: 700;
      border-radius: 5px; border: none; cursor: pointer; white-space: nowrap;
    }
    .btn-add { background: rgba(5,150,105,0.12); color: #059669; }
    .btn-add:hover { background: rgba(5,150,105,0.22); }
    .btn-del { background: rgba(220,38,38,0.1); color: #dc2626; }
    .btn-del:hover { background: rgba(220,38,38,0.2); }

    /* ── Flow Table ── */
    .flow-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .flow-table th {
      background: rgba(59,130,246,0.05); padding: 4px 5px; text-align: left;
      font-weight: 700; color: var(--text3); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap;
    }
    .flow-table td { padding: 3px 5px; border-bottom: 1px solid rgba(59,130,246,0.05); white-space: nowrap; }
    .flow-table td input[type="number"] {
      width: 56px; padding: 2px 4px; border-radius: 3px;
      border: 1px solid rgba(59,130,246,0.12); font-size: 0.8rem;
      font-family: 'Courier New', monospace; text-align: right;
    }
    .flow-table td input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 1.5px rgba(59,130,246,0.15); }
    .flow-table tr:hover { background: rgba(59,130,246,0.04); }
    .flow-table select {
      font-size: 0.76rem; padding: 2px 2px; max-width: 88px;
      border: 1px solid rgba(59,130,246,0.12); border-radius: 3px;
      background: #fff;
    }
    .flow-name-cell { display: flex; align-items: center; gap: 4px; }
    .flow-color-dot {
      width: 14px; height: 14px; min-width: 14px; padding: 0; border: none;
      border-radius: 50%; cursor: pointer; flex-shrink: 0;
      -webkit-appearance: none; appearance: none; background: none;
    }
    .flow-color-dot::-webkit-color-swatch-wrapper { padding: 0; border-radius: 50%; }
    .flow-color-dot::-webkit-color-swatch { border: 1.5px solid rgba(0,0,0,0.12); border-radius: 50%; }
    .flow-color-dot::-moz-color-swatch { border: 1.5px solid rgba(0,0,0,0.12); border-radius: 50%; }
    .flow-name-input {
      width: 100%; min-width: 70px; padding: 2px 4px;
      border: 1px solid transparent; border-radius: 3px;
      font-size: 0.8rem; font-weight: 600; color: var(--text);
      background: transparent;
    }
    .flow-name-input:hover { border-color: rgba(59,130,246,0.2); background: rgba(59,130,246,0.02); }
    .flow-name-input:focus { border-color: var(--blue); outline: none; background: #fff; }
    .flow-tx { font-family: 'Courier New', monospace; font-size: 0.78rem; color: var(--text3); text-align: right; }
    .flow-pkts { font-family: 'Courier New', monospace; font-size: 0.78rem; text-align: center; color: var(--text2); }
    .btn-row-del {
      width: 18px; height: 18px; border: none; border-radius: 50%; cursor: pointer;
      background: transparent; color: #cbd5e1; font-size: 0.8rem;
      font-weight: 700; line-height: 18px; text-align: center; padding: 0;
      transition: all 0.15s;
    }
    .btn-row-del:hover { background: rgba(220,38,38,0.12); color: #dc2626; }

    /* ── Topology ── */
    #topoContainer { background: #fff; border-radius: 6px; min-height: 320px; }

    /* ── Gantt ── */
    #ganttContainer { background: #fff; border-radius: 6px; min-height: 300px; }
    .gcl-grid line { stroke: rgba(59,130,246,0.06); stroke-width: 1; }
    .gcl-axis text { fill: var(--text2) !important; }
    .gcl-axis path, .gcl-axis line { stroke: rgba(59,130,246,0.15); }
    .gcl-label { fill: rgba(0,0,0,0.75); font-weight: 700; pointer-events: none; }

    /* ── Board GCL ── */
    .board-section {
      margin-bottom: 12px; padding: 10px 12px;
      border: 1px solid rgba(59,130,246,0.1); border-radius: 8px;
      background: rgba(59,130,246,0.02);
    }
    .board-section h3 { font-size: 0.95rem; font-weight: 700; color: var(--blue); margin: 0 0 8px 0; }
    .board-port { margin-bottom: 10px; }
    .board-port h4 { font-size: 0.85rem; font-weight: 600; color: var(--text2); margin: 0 0 5px 0; }
    .board-port .port-meta { font-size: 0.78rem; color: var(--text3); margin-bottom: 5px; }
    .gcl-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; font-family: 'Courier New', monospace; }
    .gcl-table th { background: rgba(59,130,246,0.05); color: var(--text2); padding: 4px 8px; text-align: left; font-weight: 700; border-bottom: 1px solid rgba(59,130,246,0.12); }
    .gcl-table td { padding: 3px 8px; border-bottom: 1px solid rgba(59,130,246,0.05); }
    .gcl-table tr:hover { background: rgba(59,130,246,0.04); }
    .gate-bits { display: inline-flex; gap: 1px; }
    .gate-bit { display: inline-block; width: 14px; height: 18px; border-radius: 2px; font-size: 9px; text-align: center; line-height: 18px; font-weight: 700; }
    .gate-bit.open { background: rgba(59,130,246,0.35); color: #1e40af; }
    .gate-bit.closed { background: rgba(100,116,139,0.12); color: #94a3b8; }
    .pcp-map { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
    .pcp-badge { font-size: 0.76rem; padding: 2px 9px; border-radius: 4px; background: rgba(59,130,246,0.08); color: var(--blue); font-weight: 600; }

    /* ── Tooltip ── */
    .tooltip {
      position: fixed; z-index: 1000; pointer-events: none; display: none;
      background: rgba(255,255,255,0.97); border: 1px solid rgba(59,130,246,0.25);
      color: var(--text); box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; max-width: 280px;
    }
    .tooltip.show { display: block; }
    .tooltip .tt-title { font-weight: 800; margin-bottom: 6px; color: var(--blue); }
    .tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; padding: 1px 0; }
    .tooltip .tt-k { color: var(--text3); }
    .tooltip .tt-v { font-weight: 600; font-family: 'Courier New', monospace; }

  </style>
</head>
<body>

  <!-- Top Bar: Logo + Controls -->
  <div class="top-bar">
    <div class="logo">
      <img src="keti.png" alt="KETI" onerror="this.style.display='none'">
      <h1>TSN/GCL Dashboard</h1>
    </div>
    <div class="tsep"></div>
    <label>Cycle (&micro;s)<input type="number" id="pCycle" value="1000" min="100" step="100"></label>
    <label>Guard (&micro;s)<input type="number" id="pGuard" value="0" min="0" step="0.5"></label>
    <label>Speed (Mbps)<input type="number" id="pSpeed" value="1000" min="100" step="100"></label>
    <label>Proc Delay (&micro;s)<input type="number" id="pDelay" value="5" min="0" step="0.5"></label>
    <div class="tsep"></div>
    <label>Solver
      <select id="pSolver">
        <option value="greedy" selected>Greedy</option>
        <option value="ilp">ILP (k=1)</option>
      </select>
    </label>
    <label>ILP Limit (s)<input type="number" id="pTmlim" value="120" min="5" max="600" step="10" style="width:55px;"></label>
    <div class="tsep"></div>
    <label>Link Failure
      <select id="pFail" class="fail-select">
        <option value="">None</option>
        <option value="l_swfl_swfr">FL &harr; FR</option>
        <option value="l_swfl_swrear">FL &harr; REAR</option>
        <option value="l_swfr_swrear">FR &harr; REAR</option>
      </select>
    </label>
    <button class="btn-solve" id="btnSolve">&#9654; Solve</button>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <span class="spinner-sm"></span> Loading...
  </div>

  <!-- Split: Left / Right -->
  <div class="split">
    <!-- Left Pane: Flow Config + Topology -->
    <div class="pane pane-left">
      <div class="pane-card" id="flowCard">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div class="pane-title" style="margin-bottom:0;">Flow Configuration</div>
          <div style="display:flex;gap:6px;">
            <button class="btn-add" id="btnAddFlow">+ Add Flow</button>
          </div>
        </div>
        <div style="overflow-x:auto;">
          <table class="flow-table" id="flowTable">
            <thead><tr>
              <th>Flow</th><th>Type</th><th>PCP</th><th>Bytes</th>
              <th>TX&micro;s</th><th>Period</th><th>#</th>
              <th>DL</th><th>Src</th><th>Dst</th><th></th>
            </tr></thead>
            <tbody id="flowBody"></tbody>
          </table>
        </div>
      </div>

      <div class="pane-card" id="topoCard">
        <div class="pane-title">Network Topology</div>
        <div id="topoContainer"></div>
      </div>
    </div>

    <!-- Right Pane: Gantt + Board GCL -->
    <div class="pane pane-right">
      <div class="pane-card" id="ganttCard">
        <div class="pane-title" id="ganttTitle">GCL Schedule Timeline</div>
        <div id="ganttContainer"></div>
      </div>

      <div class="pane-card" id="gclCard">
        <div class="pane-title">Board GCL Configuration (LAN9692)</div>
        <div id="gclPanel"></div>
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script src="vendor/d3.min.js"></script>
  <script type="module">
  import { ROII_REAL_8TC, ROII_REAL_SWITCHES, getRealPositions, ROII_REAL_NODE_COLORS } from './js/roii-real-data.js';
  import { solveGreedy, solveILP, initTooltip, flowColor, getFlowColorsHex } from './js/ilp-core.js';

  initTooltip();
  const round3 = v => Math.round(v * 1000) / 1000;

  const BACKBONE_REVERSE = {
    'l_swfl_swfr': 'l_swfr_swfl', 'l_swfr_swfl': 'l_swfl_swfr',
    'l_swfl_swrear': 'l_swrear_swfl', 'l_swrear_swfl': 'l_swfl_swrear',
    'l_swfr_swrear': 'l_swrear_swfr', 'l_swrear_swfr': 'l_swfr_swrear',
  };

  /* ═══════ GLPK Lazy Loader ═══════ */
  let glpkInstance = null;
  let glpkLoading = false;
  async function ensureGLPK() {
    if (glpkInstance) return glpkInstance;
    if (glpkLoading) { while (glpkLoading) await new Promise(r => setTimeout(r, 80)); return glpkInstance; }
    glpkLoading = true;
    try { const GLPK = (await import('./vendor/glpk.js')).default; glpkInstance = await GLPK(); }
    catch (e) { console.error('GLPK load error:', e); }
    glpkLoading = false;
    return glpkInstance;
  }

  /* ═══════ Helpers ═══════ */
  const getP = id => parseFloat(document.getElementById(id).value) || 0;

  function setStatus(html) {
    document.getElementById('statusBar').innerHTML = html;
  }

  /* ═══════ Flow Table — editable ═══════ */
  const NODE_IDS = ROII_REAL_8TC.nodes.map(n => n.id);
  let addCounter = 0;

  const CUSTOM_COLORS = ['#e11d48','#f97316','#84cc16','#06b6d4','#8b5cf6','#ec4899','#14b8a6','#f59e0b'];
  const baseFlows = JSON.parse(JSON.stringify(ROII_REAL_8TC.flows));
  for (const f of baseFlows) {
    if (f.traffic_type === 'lidar') f.payload_bytes = 4500;
    if (f.traffic_type === 'radar') f.payload_bytes = 1500;
    f.deadline_us = f.period_us; // period-based deadline (tighter ILP bounds)
    f.color = flowColor(f.id);
  }
  function syncColors() {
    const map = getFlowColorsHex();
    for (const f of baseFlows) map[f.id] = f.color;
  }

  function renderFlowTable() {
    const speed = getP('pSpeed') || 1000;
    const cycle = getP('pCycle') || 1000;
    const tbody = document.getElementById('flowBody');
    let html = '';
    for (let i = 0; i < baseFlows.length; i++) {
      const f = baseFlows[i];
      const tx = round3((f.payload_bytes + 38) * 8 / speed);
      const pkts = Math.round(cycle / f.period_us);
      const c = f.color || '#7b61ff';
      const name = f.id.replace(/^f_/, '');
      const srcOpts = NODE_IDS.map(n => `<option${n===f.src?' selected':''}>${n}</option>`).join('');
      const dstOpts = NODE_IDS.map(n => `<option${n===f.dst?' selected':''}>${n}</option>`).join('');
      const typeOpts = ['lidar','radar','bg'].map(t => `<option value="${t}"${t===f.traffic_type?' selected':''}>${t==='lidar'?'LiDAR':t==='radar'?'Radar':'BG'}</option>`).join('');
      html += `<tr>`;
      html += `<td><div class="flow-name-cell"><input type="color" value="${c}" class="flow-color-dot" data-idx="${i}" data-field="color"><input type="text" value="${name}" class="flow-name-input" data-idx="${i}" data-field="name"></div></td>`;
      html += `<td><select data-idx="${i}" data-field="traffic_type" style="width:58px;">${typeOpts}</select></td>`;
      html += `<td><input type="number" value="${f.PCP}" min="0" max="7" data-idx="${i}" data-field="PCP" style="width:36px;"></td>`;
      html += `<td><input type="number" value="${f.payload_bytes}" min="1" data-idx="${i}" data-field="payload_bytes" style="width:56px;"></td>`;
      html += `<td class="flow-tx">${tx}</td>`;
      html += `<td><input type="number" value="${f.period_us}" min="1" data-idx="${i}" data-field="period_us" style="width:52px;"></td>`;
      html += `<td class="flow-pkts">${pkts}</td>`;
      html += `<td><input type="number" value="${f.deadline_us || ''}" min="0" data-idx="${i}" data-field="deadline_us" placeholder="—" style="width:52px;"></td>`;
      html += `<td><select data-idx="${i}" data-field="src">${srcOpts}</select></td>`;
      html += `<td><select data-idx="${i}" data-field="dst">${dstOpts}</select></td>`;
      html += `<td><button class="btn-row-del" data-idx="${i}" title="Remove">&times;</button></td>`;
      html += `</tr>`;
    }
    tbody.innerHTML = html;
    syncColors();
    tbody.querySelectorAll('input, select').forEach(el => {
      el.addEventListener('change', () => {
        const idx = parseInt(el.dataset.idx);
        const field = el.dataset.field;
        if (field === 'color') {
          baseFlows[idx].color = el.value;
        } else if (field === 'name') {
          const old = baseFlows[idx].id;
          baseFlows[idx].id = 'f_' + el.value.replace(/^f_/, '');
          const map = getFlowColorsHex();
          if (map[old]) { map[baseFlows[idx].id] = map[old]; delete map[old]; }
        } else if (field === 'src' || field === 'dst' || field === 'traffic_type') {
          baseFlows[idx][field] = el.value;
        } else {
          baseFlows[idx][field] = el.value === '' ? null : parseFloat(el.value);
        }
        renderFlowTable();
      });
    });
    tbody.querySelectorAll('.btn-row-del').forEach(btn => {
      btn.addEventListener('click', () => {
        if (baseFlows.length <= 1) return;
        baseFlows.splice(parseInt(btn.dataset.idx), 1);
        renderFlowTable();
      });
    });
  }

  document.getElementById('btnAddFlow').addEventListener('click', () => {
    addCounter++;
    baseFlows.push({
      id: `f_custom_${addCounter}`, PCP: 3, payload_bytes: 1500,
      period_us: 500, deadline_us: 500, traffic_type: 'radar',
      src: 'RADAR_F', dst: 'ACU_IT', k_paths: 1,
      color: CUSTOM_COLORS[(addCounter - 1) % CUSTOM_COLORS.length]
    });
    renderFlowTable();
  });

  /* ═══════ Build Model ═══════ */
  function buildModel() {
    const m = JSON.parse(JSON.stringify(ROII_REAL_8TC));
    m.cycle_time_us = getP('pCycle') || 1000;
    m.guard_band_us = getP('pGuard');
    m.processing_delay_us = getP('pDelay') || 5;
    const speed = getP('pSpeed') || 1000;
    for (const lnk of m.links) lnk.rate_mbps = speed;
    m.flows = baseFlows.map(f => ({ ...f, k_paths: 1 }));
    const failedLink = document.getElementById('pFail').value;
    if (failedLink) {
      const revId = BACKBONE_REVERSE[failedLink];
      m.links = m.links.filter(l => l.id !== failedLink && l.id !== revId);
    }
    return m;
  }

  /* ═══════ Solve ═══════ */
  let solving = false;
  async function solve() {
    if (solving) return;
    solving = true;
    const btn = document.getElementById('btnSolve');
    btn.disabled = true;

    const solver = document.getElementById('pSolver').value;
    syncColors();
    const model = buildModel();
    const failedLink = document.getElementById('pFail').value;

    setStatus(`<span class="spinner-sm"></span> Solving with <strong>${solver === 'ilp' ? 'ILP' : 'Greedy'}</strong>...`);

    let result;
    try {
      if (solver === 'ilp') {
        const glpk = await ensureGLPK();
        if (!glpk) { setStatus('<span style="color:var(--red);">GLPK failed to load</span>'); solving = false; btn.disabled = false; return; }
        const tmlim = parseInt(document.getElementById('pTmlim').value) || 30;
        result = await solveILP(model, glpk, { tmlim });
      } else {
        result = solveGreedy(model);
      }

      if (result.error) {
        setStatus(`<span style="color:var(--red);">Error: ${result.error}</span>`);
      } else {
        const stPkts = result.packetRows.filter(p => p.status !== 'NON-ST');
        const worst = stPkts.length ? Math.max(...stPkts.map(p => p.e2e_delay_us)) : 0;
        const missCount = stPkts.filter(p => p.status === 'MISS').length;
        const overlapCount = stPkts.filter(p => p.status === 'OVERLAP').length;
        const failCount = missCount + overlapCount;
        let s = `<strong>${solver === 'ilp' ? 'ILP' : 'Greedy'}</strong>`;
        s += ` &nbsp;|&nbsp; Pkts: ${result.packetRows.length} &nbsp;|&nbsp; Flows: ${model.flows.length}`;
        s += ` &nbsp;|&nbsp; Util: ${result.worst_util_percent}%`;
        s += ` &nbsp;|&nbsp; Worst E2E: ${round3(worst)}\u00b5s`;
        if (result.stats) s += ` &nbsp;|&nbsp; ${result.stats.binaries} bins, ${Math.round(result.stats.runtime_ms)}ms`;
        if (result.method && result.method.includes('LP-relaxed')) s += ` &nbsp;|&nbsp; <span style="color:var(--purple);font-weight:600;">LP-relaxed</span>`;
        if (failCount === 0) s += ` &nbsp;|&nbsp; <span style="color:var(--green);font-weight:700;">ALL OK</span>`;
        else if (overlapCount > 0) s += ` &nbsp;|&nbsp; <span style="color:var(--red);font-weight:700;">${overlapCount} OVERLAP</span>`;
        else s += ` &nbsp;|&nbsp; <span style="color:var(--red);font-weight:700;">${missCount} MISS</span>`;
        if (failedLink) s += ` &nbsp;|&nbsp; <span style="color:var(--red);">FAILOVER</span>`;
        setStatus(s);
      }

      document.getElementById('ganttTitle').textContent =
        `GCL Schedule \u2014 ${solver === 'ilp' ? 'ILP' : 'Greedy'}${failedLink ? ' [FAILOVER]' : ''}`;

      renderTopology(model, failedLink, result);
      renderGantt(model, result);
      renderBoardGCL(model, result);

    } catch (e) {
      setStatus(`<span style="color:var(--red);">Error: ${e.message}</span>`);
      console.error(e);
    }

    btn.disabled = false;
    solving = false;
  }

  /* ═══════ Topology ═══════ */
  function renderTopology(model, failedLink, result) {
    const container = document.getElementById('topoContainer');
    container.innerHTML = '';
    const rect = container.getBoundingClientRect();
    const W = rect.width || 600;
    const H = Math.max(320, W * 0.65);
    container.style.height = H + 'px';

    const pos = getRealPositions(W, H);

    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('width', '100%').style('height', '100%');

    const topoBase = JSON.parse(JSON.stringify(ROII_REAL_8TC));
    const backboneIds = new Set(Object.keys(BACKBONE_REVERSE));
    const failedSet = new Set();
    if (failedLink) { failedSet.add(failedLink); const rv = BACKBONE_REVERSE[failedLink]; if (rv) failedSet.add(rv); }
    const drawnBi = new Set();
    const tooltip = document.getElementById('tooltip');

    // Pre-compute per-link utilization from result
    const linkUtil = {};
    if (result && result.gcl && result.gcl.links) {
      for (const [lid, ld] of Object.entries(result.gcl.links)) {
        let used = 0;
        for (const e of (ld.entries || [])) {
          if (!e.note.includes('all-gates-closed') && !e.note.includes('non-ST')) used += e.duration_us;
        }
        linkUtil[lid] = round3(used / model.cycle_time_us * 100);
      }
    }

    // Pre-compute per-node flow info
    const nodeFlows = {};
    for (const f of baseFlows) {
      if (!nodeFlows[f.src]) nodeFlows[f.src] = [];
      nodeFlows[f.src].push(f);
      if (!nodeFlows[f.dst]) nodeFlows[f.dst] = [];
    }

    // Draw links with hover
    for (const lnk of topoBase.links) {
      const p1 = pos[lnk.from], p2 = pos[lnk.to];
      if (!p1 || !p2) continue;
      const isBackbone = backboneIds.has(lnk.id);
      if (isBackbone) {
        const biKey = [lnk.from, lnk.to].sort().join('|');
        if (drawnBi.has(biKey)) continue;
        drawnBi.add(biKey);
      }
      const isFailed = failedSet.has(lnk.id);
      const isGateway = lnk.id === 'l_swrear_acu';
      let color, width, dash;
      if (isFailed) { color = 'rgba(220,38,38,0.7)'; width = 4; dash = '8,5'; }
      else if (isBackbone) { color = 'rgba(59,130,246,0.4)'; width = 3; dash = 'none'; }
      else if (isGateway) { color = 'rgba(6,182,212,0.55)'; width = 3.5; dash = 'none'; }
      else { color = 'rgba(59,130,246,0.2)'; width = 2; dash = 'none'; }

      const baseLine = svg.append('line')
        .attr('x1', p1.x).attr('y1', p1.y).attr('x2', p2.x).attr('y2', p2.y)
        .attr('stroke', color).attr('stroke-width', width);
      if (dash !== 'none') baseLine.attr('stroke-dasharray', dash);

      if (isFailed) {
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        svg.append('circle').attr('cx', mx).attr('cy', my).attr('r', 14)
          .attr('fill', 'rgba(220,38,38,0.12)').attr('stroke', '#dc2626').attr('stroke-width', 2);
        svg.append('text').attr('x', mx).attr('y', my + 1)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
          .attr('font-size', '16px').attr('font-weight', '900').attr('fill', '#dc2626').text('\u2716');
      }

      // Hover hitbox for link
      const util1 = linkUtil[lnk.id] || 0;
      const revLnk = isBackbone ? BACKBONE_REVERSE[lnk.id] : null;
      const util2 = revLnk ? (linkUtil[revLnk] || 0) : 0;
      const linkType = isFailed ? 'FAILED' : isBackbone ? 'Backbone' : isGateway ? 'Gateway' : 'Sensor Link';

      svg.append('line')
        .attr('x1', p1.x).attr('y1', p1.y).attr('x2', p2.x).attr('y2', p2.y)
        .attr('stroke', 'transparent').attr('stroke-width', 14)
        .style('cursor', 'pointer')
        .on('mouseover', () => {
          baseLine.attr('stroke-width', width + 3).attr('stroke', isFailed ? '#dc2626' : '#3B82F6');
          let html = `<div class="tt-title">${lnk.from} \u2194 ${lnk.to}</div>`;
          html += `<div class="tt-row"><span class="tt-k">Type</span><span class="tt-v">${linkType}</span></div>`;
          html += `<div class="tt-row"><span class="tt-k">Speed</span><span class="tt-v">${lnk.rate_mbps} Mbps</span></div>`;
          if (!isFailed) {
            html += `<div class="tt-row"><span class="tt-k">${lnk.from}\u2192${lnk.to}</span><span class="tt-v">${util1}%</span></div>`;
            if (isBackbone) html += `<div class="tt-row"><span class="tt-k">${lnk.to}\u2192${lnk.from}</span><span class="tt-v">${util2}%</span></div>`;
          }
          tooltip.innerHTML = html;
          tooltip.classList.add('show');
        })
        .on('mousemove', ev => { tooltip.style.left = (ev.clientX+14)+'px'; tooltip.style.top = (ev.clientY-20)+'px'; })
        .on('mouseout', () => {
          baseLine.attr('stroke-width', width).attr('stroke', color);
          tooltip.classList.remove('show');
        });
    }

    // Draw nodes with hover
    for (const node of topoBase.nodes) {
      const p = pos[node.id];
      if (!p) continue;
      const nc = ROII_REAL_NODE_COLORS[node.id] || { fill: '#e2e8f0', stroke: '#94a3b8', shortLabel: node.id, label: node.id };
      const isSwitch = node.type === 'switch';
      const isACU = node.id === 'ACU_IT';
      const isLidar = node.id.startsWith('LIDAR');
      const r = isACU ? 24 : isSwitch ? 22 : isLidar ? 20 : 17;

      const circle = svg.append('circle').attr('cx', p.x).attr('cy', p.y).attr('r', r)
        .attr('fill', nc.fill).attr('stroke', nc.stroke).attr('stroke-width', 2);
      svg.append('text').attr('x', p.x).attr('y', p.y + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('font-size', '11px').attr('font-weight', '800').attr('fill', nc.stroke)
        .style('pointer-events', 'none').text(nc.shortLabel);
      svg.append('text').attr('x', p.x).attr('y', p.y + r + 13)
        .attr('text-anchor', 'middle').attr('font-size', '10px').attr('font-weight', '700')
        .attr('fill', '#334155').style('pointer-events', 'none').text(nc.label || node.id);

      // Node hover hitbox
      const flows = (nodeFlows[node.id] || []).filter(f => f.src === node.id);
      svg.append('circle').attr('cx', p.x).attr('cy', p.y).attr('r', r + 4)
        .attr('fill', 'transparent').style('cursor', 'pointer')
        .on('mouseover', () => {
          circle.attr('stroke-width', 4).attr('r', r + 3);
          let html = `<div class="tt-title">${nc.label || node.id}</div>`;
          html += `<div class="tt-row"><span class="tt-k">Type</span><span class="tt-v">${isSwitch ? 'Switch (LAN9692)' : isACU ? 'ACU (Processing)' : isLidar ? 'LiDAR Sensor' : 'Radar Sensor'}</span></div>`;
          if (flows.length) {
            html += `<div style="margin-top:4px;border-top:1px solid rgba(59,130,246,0.15);padding-top:4px;">`;
            for (const f of flows) {
              const tx = round3((f.payload_bytes + 38) * 8 / (getP('pSpeed') || 1000));
              const clr = flowColor(f.id) || '#7b61ff';
              html += `<div class="tt-row"><span class="tt-k" style="color:${clr};">\u25CF ${f.id.replace('f_','')}</span><span class="tt-v">${f.payload_bytes}B (${tx}\u00b5s)</span></div>`;
            }
            html += `</div>`;
          } else if (isACU) {
            html += `<div class="tt-row"><span class="tt-k">Role</span><span class="tt-v">All flows dst</span></div>`;
          }
          tooltip.innerHTML = html;
          tooltip.classList.add('show');
        })
        .on('mousemove', ev => { tooltip.style.left = (ev.clientX+14)+'px'; tooltip.style.top = (ev.clientY-20)+'px'; })
        .on('mouseout', () => {
          circle.attr('stroke-width', 2).attr('r', r);
          tooltip.classList.remove('show');
        });
    }
  }

  /* ═══════ Gantt ═══════ */
  function renderGantt(model, result) {
    const container = document.getElementById('ganttContainer');
    container.innerHTML = '';
    if (!result || result.error || !result.gcl) return;

    const activeLinks = model.links.filter(l => {
      const entries = result.gcl?.links?.[l.id]?.entries;
      return entries?.some(e => !e.note.includes('non-ST') && !e.note.includes('all-gates-closed'));
    });
    if (!activeLinks.length) return;

    const W = container.clientWidth || 700;
    const margin = { top: 24, right: 50, bottom: 34, left: 110 };
    const rowH = 30;
    const innerW = W - margin.left - margin.right;
    const innerH = activeLinks.length * rowH;
    const H = margin.top + innerH + margin.bottom;

    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('width', '100%');

    const defs = svg.append('defs');
    const pId = 'guardH';
    const gp = defs.append('pattern').attr('id', pId)
      .attr('patternUnits', 'userSpaceOnUse').attr('width', 6).attr('height', 6)
      .attr('patternTransform', 'rotate(45)');
    gp.append('rect').attr('width', 6).attr('height', 6).attr('fill', '#f9a825');
    gp.append('line').attr('x1', 0).attr('y1', 0).attr('x2', 0).attr('y2', 6)
      .attr('stroke', 'rgba(0,0,0,0.2)').attr('stroke-width', 2);

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
    const x = d3.scaleLinear().domain([0, model.cycle_time_us]).range([0, innerW]);
    const y = d3.scaleBand().domain(activeLinks.map(l => l.id)).range([0, innerH]).padding(0.12);

    g.append('g').attr('class', 'gcl-grid')
      .selectAll('line').data(x.ticks(8)).enter().append('line')
      .attr('x1', d => x(d)).attr('x2', d => x(d)).attr('y1', 0).attr('y2', innerH);

    g.append('g').attr('class', 'gcl-axis').attr('transform', `translate(0,${innerH})`)
      .call(d3.axisBottom(x).ticks(8).tickFormat(d => d + '\u00b5s'))
      .selectAll('text').attr('font-size', '11px');

    g.append('g').attr('class', 'gcl-axis')
      .call(d3.axisLeft(y).tickSize(0).tickPadding(6))
      .selectAll('text').text(d => {
        const lnk = model.links.find(l => l.id === d);
        return lnk ? `${lnk.from} \u2192 ${lnk.to}` : d;
      }).attr('font-size', '10px');

    g.selectAll('.rbg').data(activeLinks).enter().append('rect')
      .attr('x', 0).attr('y', d => y(d.id)).attr('width', innerW).attr('height', y.bandwidth())
      .attr('fill', (_, i) => i % 2 === 0 ? 'rgba(59,130,246,0.03)' : 'transparent').attr('rx', 2);

    const tooltip = document.getElementById('tooltip');
    for (const lnk of activeLinks) {
      const entries = result.gcl.links[lnk.id]?.entries || [];
      let used = 0;
      for (const e of entries) {
        const xPos = x(e.start_us); const actualW = x(e.end_us) - xPos;
        const yPos = y(lnk.id); if (yPos === undefined) continue;
        const bw = y.bandwidth();

        if (e.note === 'guard') {
          g.append('rect').attr('x', xPos).attr('y', yPos)
            .attr('width', Math.max(actualW, 1)).attr('height', bw)
            .attr('fill', `url(#${pId})`).attr('opacity', 0.7).attr('rx', 2);
        } else if (e.note.includes('all-gates-closed') || e.note.includes('non-ST')) {
          // skip
        } else {
          const fid = e.note.split('#')[0];
          const color = flowColor(fid) || '#3B82F6';
          const displayW = Math.max(actualW, 1);

          g.append('rect').attr('x', xPos).attr('y', yPos)
            .attr('width', displayW).attr('height', bw)
            .attr('fill', color).attr('stroke', 'rgba(255,255,255,0.4)')
            .attr('stroke-width', 0.8).attr('rx', 3).attr('opacity', 0.9);

          const hitW = Math.max(displayW, 8); const hitOff = (hitW - displayW) / 2;
          g.append('rect').attr('x', xPos - hitOff).attr('y', yPos)
            .attr('width', hitW).attr('height', bw)
            .attr('fill', 'transparent').style('cursor', 'pointer')
            .on('mouseover', () => {
              tooltip.innerHTML = `<div class="tt-title" style="color:${color}">${e.note}</div>`
                + `<div class="tt-row"><span class="tt-k">Gate</span><span class="tt-v">${e.gate_mask}</span></div>`
                + `<div class="tt-row"><span class="tt-k">Start</span><span class="tt-v">${e.start_us}\u00b5s</span></div>`
                + `<div class="tt-row"><span class="tt-k">End</span><span class="tt-v">${e.end_us}\u00b5s</span></div>`
                + `<div class="tt-row"><span class="tt-k">Duration</span><span class="tt-v">${e.duration_us}\u00b5s</span></div>`;
              tooltip.classList.add('show');
            })
            .on('mousemove', ev => { tooltip.style.left = (ev.clientX+12)+'px'; tooltip.style.top = (ev.clientY-20)+'px'; })
            .on('mouseout', () => tooltip.classList.remove('show'));

          if (actualW > 20) {
            g.append('text').attr('class', 'gcl-label')
              .attr('x', xPos + actualW/2).attr('y', yPos + bw/2)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
              .attr('font-size', '10px')
              .text(e.note.replace('#', '.'));
          }
          used += e.duration_us;
        }
      }
      g.append('text').attr('x', innerW + 4).attr('y', y(lnk.id) + y.bandwidth()/2)
        .attr('text-anchor', 'start').attr('dominant-baseline', 'middle')
        .attr('font-size', '10px').attr('fill', 'var(--text3)').attr('font-weight', '700')
        .text((used / model.cycle_time_us * 100).toFixed(1) + '%');
    }

    svg.append('text').attr('x', margin.left).attr('y', margin.top - 8)
      .attr('fill', 'var(--text3)').attr('font-size', '9px')
      .text(`Cycle: ${model.cycle_time_us}\u00b5s | Active: ${activeLinks.length}/${model.links.length} links`);
  }

  /* ═══════ Board GCL ═══════ */
  function renderBoardGCL(model, result) {
    const panel = document.getElementById('gclPanel');
    if (!result || result.error || !result.boardConfigs) {
      panel.innerHTML = '<p style="color:var(--text3);padding:6px;">No GCL data</p>';
      return;
    }
    let html = '';
    for (const sw of ROII_REAL_SWITCHES) {
      const cfg = result.boardConfigs[sw.id];
      if (!cfg) continue;
      html += `<div class="board-section"><h3>${sw.label} (${sw.chip})</h3>`;
      for (const [portId, port] of Object.entries(cfg.ports)) {
        html += `<div class="board-port">`;
        html += `<h4>Egress &rarr; ${port.to} <span style="color:var(--text3);font-weight:400;">(${portId})</span></h4>`;
        html += `<div class="port-meta">Cycle: ${port.cycle_time_us}&micro;s | Guard: ${port.guard_band_us}&micro;s | Entries: ${port.num_entries}</div>`;
        if (port.pcp_queue_map.length) {
          html += `<div class="pcp-map">`;
          for (const m of port.pcp_queue_map) html += `<span class="pcp-badge">PCP ${m.pcp} &rarr; Q${m.queue}</span>`;
          html += `</div>`;
        }
        html += `<table class="gcl-table"><thead><tr><th>#</th><th>Gate Mask</th><th>Start</th><th>End</th><th>Dur</th><th>TC</th><th>Note</th></tr></thead><tbody>`;
        for (const e of port.entries) {
          const bits = e.gate_mask.split('');
          const isGuard = e.note === 'guard';
          const isClosed = e.note === 'all-gates-closed';
          let bitsHtml = '<span class="gate-bits">';
          for (let b = 0; b < 8; b++) {
            const cls = isGuard ? 'guard' : (bits[b] === '1' ? 'open' : 'closed');
            bitsHtml += `<span class="gate-bit ${cls}">${7-b}</span>`;
          }
          bitsHtml += '</span>';
          let tc = '-';
          if (isGuard) tc = 'Guard';
          else if (isClosed) tc = 'Closed';
          else if (e.gate_mask === '11111111') tc = 'BE';
          else { const q = e.gate_mask.split('').reverse().indexOf('1'); if (q >= 0) tc = 'TC' + q; }
          html += `<tr><td>${e.index}</td><td>${bitsHtml}</td><td>${e.start_us}</td><td>${e.end_us}</td><td>${e.duration_us}</td><td>${tc}</td><td>${e.note}</td></tr>`;
        }
        html += `</tbody></table></div>`;
      }
      html += `</div>`;
    }
    panel.innerHTML = html;
  }

  /* ═══════ Events ═══════ */
  document.getElementById('btnSolve').addEventListener('click', () => {
    renderFlowTable();
    solve();
  });
  document.getElementById('pSpeed').addEventListener('change', renderFlowTable);
  document.getElementById('pCycle').addEventListener('change', renderFlowTable);
  document.getElementById('pFail').addEventListener('change', () => { renderFlowTable(); solve(); });

  /* ═══════ Init: Greedy first ═══════ */
  renderFlowTable();
  solve();
  ensureGLPK();
  </script>
</body>
</html>
