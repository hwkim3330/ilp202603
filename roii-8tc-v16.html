  /* ═══════ Build Model ═══════ */
  function buildModel() {
    const m = JSON.parse(JSON.stringify(ROII_REAL_8TC));
    m.cycle_time_us = getP('pCycle') || 1000;
    m.guard_band_us = getP('pGuard');
    m.processing_delay_us = getP('pDelay') || 5;
    const speed = getP('pSpeed') || 1000;
    for (const lnk of m.links) lnk.rate_mbps = speed;
    m.flows = baseFlows.map(f => ({ ...f }));

    // Add BG nodes dynamically based on flow sources
    const bgSrcs = new Set(baseFlows.filter(f => /^BG\d*$/.test(f.src)).map(f => f.src));
    const bgLinkMap = { BG1: 'SW_FR', BG2: 'SW_REAR', BG3: 'SW_FL' };
    for (const bgId of bgSrcs) {
      m.nodes.push({ id: bgId, type: 'endstation' });
      const target = bgLinkMap[bgId] || 'SW_FR';
      m.links.push({ id: `l_${bgId.toLowerCase()}_${target.toLowerCase().replace('_','')}`, from: bgId, to: target, rate_mbps: speed, prop_delay_us: 0.3 });
    }

    const failedLink = document.getElementById('pFail').value;
    if (failedLink) {
      const revId = BACKBONE_REVERSE[failedLink];
      m.links = m.links.filter(l => l.id !== failedLink && l.id !== revId);
    }
    return m;
  }

  /* ═══════ Rebuild guard bands: demo-style (BEFORE TSN packets on trunk links) ═══════ */
  function fixGuardBands(model, result) {
    if (!result?.gcl?.links) return;
    const guard_us = model.guard_band_us;
    if (!guard_us || guard_us <= 0) return;
    const nodeType = {};
    for (const n of model.nodes) nodeType[n.id] = n.type;

    for (const lnk of model.links) {
      if (nodeType[lnk.from] !== 'switch') continue;
      const ld = result.gcl.links[lnk.id];
      if (!ld || !ld.entries) continue;

      // Extract packet entries (contain '#', e.g. f_radar_f#0)
      const pktEntries = ld.entries.filter(e => e.note.includes('#'));
      if (!pktEntries.length) continue;
      pktEntries.sort((a, b) => a.start_us - b.start_us);

      // Rebuild entries with guard bands BEFORE TSN packets
      // Guard band = all-gates-closed window inserted BEFORE a TSN packet
      // to prevent leftover frames from the previous window bleeding in.
      // At cycle start (t=0) there is no prior traffic → no guard needed.
      const entries = [];
      let cur = 0, idx = 0;
      for (const p of pktEntries) {
        if (p.start_us > cur + 0.001) {
          const gapS = round3(cur), gapE = round3(p.start_us), gap = round3(gapE - gapS);
          const isTSN = !p.note.includes('non-ST');
          const atCycleStart = gapS < 0.01;  // no prior traffic → guard unnecessary
          if (isTSN && !atCycleStart && gap > guard_us) {
            const gs = round3(gapE - guard_us);
            entries.push({ index: idx++, gate_mask: '11111111', start_us: gapS, end_us: gs, duration_us: round3(gs - gapS), note: 'non-ST' });
            entries.push({ index: idx++, gate_mask: '00000000', start_us: gs, end_us: gapE, duration_us: round3(guard_us), note: 'guard' });
          } else if (isTSN && !atCycleStart && gap > 0) {
            entries.push({ index: idx++, gate_mask: '00000000', start_us: gapS, end_us: gapE, duration_us: gap, note: 'guard' });
          } else if (gap > 0) {
            entries.push({ index: idx++, gate_mask: '11111111', start_us: gapS, end_us: gapE, duration_us: gap, note: 'non-ST' });
          }
        }
        entries.push({ ...p, index: idx++ });
        cur = Math.max(cur, p.end_us);
      }
      if (cur < model.cycle_time_us - 0.001) {
        entries.push({ index: idx++, gate_mask: '11111111', start_us: round3(cur), end_us: model.cycle_time_us, duration_us: round3(model.cycle_time_us - cur), note: 'non-ST' });
      }
      ld.entries = entries;
    }
    // Sync boardConfigs
    if (result.boardConfigs) {
      for (const sw of Object.values(result.boardConfigs)) {
        for (const [pid, port] of Object.entries(sw.ports)) {
          const ld = result.gcl.links[pid];
          if (ld) { port.entries = ld.entries; port.num_entries = ld.entries.length; }
        }
      }
    }
  }

  /* ═══════ Patch idle → TC0 Best Effort ═══════ */
  function patchIdleToTC0(result) {
    if (!result?.gcl?.links) return;
    for (const linkData of Object.values(result.gcl.links)) {
      for (const e of linkData.entries) {
        if (e.gate_mask === '00000000' && e.note !== 'guard') {
          e.gate_mask = '00000001'; e.note = 'BE (TC0)';
        }
        if (e.gate_mask === '11111111' && (e.note.includes('non-ST') || e.note === 'BE')) {
          e.gate_mask = '00000001'; e.note = 'BE (TC0)';
        }
      }
    }
    if (result.boardConfigs) {
      for (const sw of Object.values(result.boardConfigs)) {
        for (const port of Object.values(sw.ports)) {
          for (const e of port.entries) {
            if (e.gate_mask === '00000000' && e.note !== 'guard') {
              e.gate_mask = '00000001'; e.note = 'BE (TC0)';
            }
            if (e.gate_mask === '11111111' && (e.note.includes('non-ST') || e.note === 'BE')) {
              e.gate_mask = '00000001'; e.note = 'BE (TC0)';
            }
          }
        }
      }
    }
  }

  /* ═══════ BG Packet Placement (post-ILP) ═══════ */
  function addBgPackets(fullModel, bgFlows, result) {
    const cycleTime = fullModel.cycle_time_us;
    const lm = new Map(fullModel.links.map(l => [l.id, l]));
    const adj = new Map();
    for (const l of fullModel.links) {
      if (!adj.has(l.from)) adj.set(l.from, []);
      adj.get(l.from).push({ to: l.to, lid: l.id });
    }
    const occ = {};
    for (const lnk of fullModel.links) occ[lnk.id] = [];
    for (const pk of result.packetRows) {
      for (const h of pk.hops) occ[h.link_id].push([h.start_us, h.end_us]);
    }
    for (const lid of Object.keys(occ)) occ[lid].sort((a, b) => a[0] - b[0]);

    function findSlot(lid, earliest, duration) {
      let t = Math.max(0, earliest);
      for (let iter = 0; iter < 500; iter++) {
        if (t + duration > cycleTime) return null;
        let conflict = false;
        for (const [s, e] of occ[lid]) {
          if (t < e && t + duration > s) { t = e; conflict = true; break; }
        }
        if (!conflict) return t;
      }
      return null;
    }

    const bgPkts = [];
    for (const f of bgFlows) {
      const reps = Math.max(1, Math.round(cycleTime / f.period_us));
      const paths = generateKPaths(adj, f.src, f.dst, 1, fullModel.nodes.length + 2);
      if (!paths.length) continue;
      for (let k = 0; k < reps; k++) {
        bgPkts.push({
          pid: `${f.id}#${k}`, fid: f.id, pri: f.PCP ?? 0,
          rel: (f.rel != null ? f.rel : 0) + k * f.period_us,
          hopsTemplate: paths[0].map(lid => ({
            lid, tx: round3((f.payload_bytes + 38) * 8 / lm.get(lid).rate_mbps),
            pd: lm.get(lid).prop_delay_us
          }))
        });
      }
    }
    bgPkts.sort((a, b) => a.rel - b.rel);

    for (const pk of bgPkts) {
      const hops = [];
      let t = pk.rel, valid = true;
      for (const hp of pk.hopsTemplate) {
        const s = findSlot(hp.lid, t, hp.tx);
        if (s == null) { valid = false; break; }
        hops.push({ link_id: hp.lid, start_us: round3(s), end_us: round3(s + hp.tx), duration_us: round3(hp.tx), queue: 0 });
        t = round3(s + hp.tx + hp.pd + fullModel.processing_delay_us);
      }
      if (!valid || !hops.length) continue;
      for (const h of hops) { occ[h.link_id].push([h.start_us, h.end_us]); occ[h.link_id].sort((a, b) => a[0] - b[0]); }
      for (const h of hops) {
        const le = result.gcl.links[h.link_id];
        if (le) le.entries.push({ index: le.entries.length, gate_mask: '00000001', start_us: h.start_us, end_us: h.end_us, duration_us: h.duration_us, note: `${pk.pid} (non-ST)` });
      }
      const fin = round3(hops.at(-1).end_us + pk.hopsTemplate.at(-1).pd);
      result.packetRows.push({
        packet_id: pk.pid, flow_id: pk.fid, priority: pk.pri,
        selected_route: 0, release_us: round3(pk.rel), end_us: fin,
        e2e_delay_us: round3(fin - pk.rel), deadline_abs_us: null, slack_us: null,
        status: 'NON-ST', hops
      });
    }
    result.packetRows.sort((a, b) => a.end_us - b.end_us);
  }

  /* ═══════ Load pre-computed profile ═══════ */
  // Reconstructs full result (GCL + boardConfigs) from packetRows only.
  // Then runs the same pipeline as normal solve: addBgPackets → fixGuardBands → patchIdleToTC0.
  function loadProfile(profile, model) {
    const C = model.cycle_time_us;
    const result = JSON.parse(JSON.stringify(profile));
    // Build GCL from packetRows (same as ilp-core buildResult)
    const linkMap = Object.fromEntries(model.links.map(l => [l.id, l]));
    const nodeType = Object.fromEntries(model.nodes.map(n => [n.id, n.type]));
    const linkOcc = {};  // link_id → [{start, end, gate_mask, note}]
    for (const lnk of model.links) linkOcc[lnk.id] = [];
    for (const pk of result.packetRows) {
      const pcp = pk.priority;
      const mask = '0'.repeat(7 - pcp) + '1' + '0'.repeat(pcp);
      for (const h of pk.hops) {
        linkOcc[h.link_id]?.push({ start_us: h.start_us, end_us: h.end_us, duration_us: h.duration_us, gate_mask: mask, note: pk.packet_id });
      }
    }
    // Build gcl.links
    result.gcl = { cycleTime: C, base_time_us: 0, links: {} };
    for (const lnk of model.links) {
      const occ = linkOcc[lnk.id].sort((a, b) => a.start_us - b.start_us);
      const entries = [];
      let cur = 0, idx = 0;
      for (const o of occ) {
        if (o.start_us > cur + 0.001) {
          entries.push({ index: idx++, gate_mask: '00000000', start_us: round3(cur), end_us: round3(o.start_us), duration_us: round3(o.start_us - cur), note: 'gap' });
        }
        entries.push({ index: idx++, ...o });
        cur = Math.max(cur, o.end_us);
      }
      if (cur < C - 0.001) {
        entries.push({ index: idx++, gate_mask: '00000000', start_us: round3(cur), end_us: C, duration_us: round3(C - cur), note: 'gap' });
      }
      result.gcl.links[lnk.id] = { from: lnk.from, to: lnk.to, entries };
    }
    // Add BG packets in gaps
    const bgFlows = model.flows.filter(f => f.deadline_us == null);
    if (bgFlows.length) addBgPackets(model, bgFlows, result);
    // Same post-processing as normal solve
    fixGuardBands(model, result);
    patchIdleToTC0(result);
    // Build boardConfigs
    result.boardConfigs = {};
    for (const lnk of model.links) {
      if (nodeType[lnk.from] !== 'switch') continue;
      if (!result.boardConfigs[lnk.from]) result.boardConfigs[lnk.from] = { ports: {} };
      const entries = result.gcl.links[lnk.id]?.entries || [];
      const pcpSet = new Set();
      for (const e of entries) {
        if (e.gate_mask && e.gate_mask !== '00000000' && e.gate_mask !== '11111111' && e.gate_mask !== '00000001') {
          const q = e.gate_mask.split('').reverse().indexOf('1');
          if (q >= 0) pcpSet.add(q);
        }
      }
      result.boardConfigs[lnk.from].ports[lnk.id] = {
        to: lnk.to, cycle_time_us: C, guard_band_us: model.guard_band_us,
        num_entries: entries.length,
        pcp_queue_map: [...pcpSet].sort((a, b) => b - a).map(q => ({ pcp: q, queue: q })),
        entries
      };
    }
    return result;
  }

  /* ═══════ Solve ═══════ */
  let solving = false;
  async function solve(forceRun) {
    if (solving) return;
    solving = true;
    selectedFlowId = null;
    selectedSwitchId = null;
    selectedLinkId = null;
    const btn = document.getElementById('btnSolve');
    btn.disabled = true;

    const solver = document.getElementById('pSolver').value;
    syncColors();
    buildSensorFlowMap();
    const model = buildModel();
    const failedLink = document.getElementById('pFail').value;

    // Pre-computed ILP profiles for Case 1 & 2
    const PROFILES = { 1: CASE1_PROFILE, 2: CASE2_PROFILE };
    const profile = PROFILES[currentCase];
    if (profile && !forceRun && !failedLink) {
      const result = loadProfile(profile, model);
      xref.flowRoutes = buildFlowRoutes(result);
      const stPkts = result.packetRows.filter(p => p.status !== 'NON-ST');
      const worst = stPkts.length ? Math.max(...stPkts.map(p => p.e2e_delay_us)) : 0;
      const missCount = stPkts.filter(p => p.status === 'MISS').length;
      let s = `\u2713 <strong>ILP</strong> (pre-computed optimal) | ${result.packetRows.length} pkts | Util ${result.worst_util_percent}% | Worst E2E ${round3(worst)}\u00b5s`;
      s += missCount === 0 ? ` | <span style="color:var(--green);font-weight:700;">ALL OK</span>` : ` | <span style="color:var(--red);font-weight:700;">${missCount} MISS</span>`;
      setStatus(s);
      document.getElementById('ganttTitle').textContent = `GCL Schedule \u2014 Case ${currentCase} (ILP optimal)`;
      renderTopology(model, failedLink, result);
      renderGantt(model, result);
      renderE2E(model, result);
      renderBoardGCL(model, result);
      btn.disabled = false;
      solving = false;
      return;
    }

    setStatus(`<span class="spinner-sm"></span> Case ${currentCase} | <strong>${solver === 'ilp' ? 'ILP' : 'Greedy'}</strong> | ${model.flows.length} flows | cycle ${model.cycle_time_us}\u00b5s`);

    let result;
    try {
      if (solver === 'ilp') {
        const glpk = await ensureGLPK();
        if (!glpk) { setStatus('<span style="color:var(--red);">GLPK failed to load</span>'); solving = false; btn.disabled = false; return; }
        const tmlim = parseInt(document.getElementById('pTmlim').value) || 30;

        // Separate ST and BG flows — only ST enters ILP
        const stFlows = model.flows.filter(f => f.deadline_us != null);
        const bgFlows = model.flows.filter(f => f.deadline_us == null);
        const ilpModel = bgFlows.length > 0 ? { ...model, flows: stFlows } : model;

        result = await solveILP(ilpModel, glpk, { tmlim, onProgress: info => {
          if (info.phase === 'building') {
            const bgNote = bgFlows.length > 0 ? ` (${bgFlows.length} BG deferred)` : '';
            setStatus(`<span class="spinner-sm"></span> <strong>ILP</strong> \u2014 ${info.pkts} pkts from ${info.flows} flows${bgNote}...`);
          } else if (info.phase === 'solving') {
            const p = info.pruning || {};
            let detail = `${info.bins} bins, ${info.constraints} cstr`;
            if (p.window || p.dominance || p.symmetry) {
              detail += ` (pruned: ${p.window||0} win, ${p.dominance||0} dom, ${p.symmetry||0} sym)`;
            }
            setStatus(`<span class="spinner-sm"></span> <strong>ILP</strong> \u2014 GLPK: ${info.pkts} pkts, ${detail}...`);
          }
        }});

        // Place BG packets in gaps after ILP
        if (bgFlows.length > 0 && !result.error) {
          addBgPackets(model, bgFlows, result);
        }
      } else {
        result = solveGreedy(model);
      }

      fixGuardBands(model, result);
      patchIdleToTC0(result);
      xref.flowRoutes = buildFlowRoutes(result);

      if (result.error) {
        setStatus(`<span style="color:var(--red);">Error: ${result.error}</span>`);
      } else {
        const stPkts = result.packetRows.filter(p => p.status !== 'NON-ST');
        const worst = stPkts.length ? Math.max(...stPkts.map(p => p.e2e_delay_us)) : 0;
        const missCount = stPkts.filter(p => p.status === 'MISS').length;
        const overlapCount = stPkts.filter(p => p.status === 'OVERLAP').length;
        const failCount = missCount + overlapCount;
        let s = `\u2713 <strong>${solver === 'ilp' ? 'ILP' : 'Greedy'}</strong>`;
        if (solver === 'greedy') s += ` <span style="color:#94a3b8;font-size:11px;">(PCP\u2193 &gt; Release\u2191 &gt; EDF)</span>`;
        s += ` | ${result.packetRows.length} pkts`;
        s += ` | Util ${result.worst_util_percent}%`;
        s += ` | Worst E2E ${round3(worst)}\u00b5s`;
        if (result.stats) {
          s += ` | ${result.stats.binaries} bins, ${Math.round(result.stats.runtime_ms)}ms`;
          if (result.method && result.method.includes('optimal')) s += ` <span style="color:var(--green);">\u2713 optimal</span>`;
        }
        if (failCount === 0) s += ` | <span style="color:var(--green);font-weight:700;">ALL OK</span>`;
        else if (overlapCount > 0) s += ` | <span style="color:var(--red);font-weight:700;">${overlapCount} OVERLAP</span>`;
        else s += ` | <span style="color:var(--red);font-weight:700;">${missCount} MISS</span>`;
        if (failedLink) s += ` | <span style="color:var(--red);">FAILOVER</span>`;

        // Auto-compare: run the other solver and show contrast
        try {
          let cmpResult;
          if (solver === 'ilp') {
            cmpResult = solveGreedy(model);
          } else {
            const glpk2 = await ensureGLPK();
            if (glpk2) {
              const cmpST = model.flows.filter(f => f.deadline_us != null);
              const cmpBG = model.flows.filter(f => f.deadline_us == null);
              const cmpModel = cmpBG.length > 0 ? { ...model, flows: cmpST } : model;
              cmpResult = await solveILP(cmpModel, glpk2, { tmlim: 15 });
              if (cmpBG.length > 0 && cmpResult && !cmpResult.error) addBgPackets(model, cmpBG, cmpResult);
            }
          }
          if (cmpResult && !cmpResult.error) {
            const cmpST = cmpResult.packetRows.filter(p => p.status !== 'NON-ST');
            const cmpMiss = cmpST.filter(p => p.status === 'MISS').length;
            const cmpOverlap = cmpST.filter(p => p.status === 'OVERLAP').length;
            const cmpFail = cmpMiss + cmpOverlap;
            const cmpName = solver === 'ilp' ? 'Greedy' : 'ILP';
            if (cmpFail > 0) {
              s += ` | <span style="opacity:0.7;">vs ${cmpName}: <span style="color:var(--red);">${cmpFail} FAIL</span></span>`;
            } else {
              s += ` | <span style="opacity:0.7;">vs ${cmpName}: ALL OK</span>`;
            }
          }
        } catch(e) { /* comparison is optional */ }

        setStatus(s);
      }

      document.getElementById('ganttTitle').textContent =
        `GCL Schedule \u2014 Case ${currentCase} (${solver === 'ilp' ? 'ILP' : 'Greedy'})${failedLink ? ' [FAILOVER]' : ''}`;

      renderTopology(model, failedLink, result);
      renderGantt(model, result);
      renderE2E(model, result);
      renderBoardGCL(model, result);


    } catch (e) {
      console.error(e);
      if (solver === 'ilp') {
        try {
          result = solveGreedy(model);
          fixGuardBands(model, result);
          patchIdleToTC0(result);
          xref.flowRoutes = buildFlowRoutes(result);
          renderTopology(model, failedLink, result);
          renderGantt(model, result);
          renderE2E(model, result);
          renderBoardGCL(model, result);
    
          const stPkts = result.packetRows.filter(p => p.status !== 'NON-ST');
          const worst = stPkts.length ? Math.max(...stPkts.map(p => p.e2e_delay_us)) : 0;
          setStatus(`<span style="color:var(--red);">ILP failed</span> \u2192 Greedy fallback | Pkts: ${result.packetRows.length} | Util: ${result.worst_util_percent}% | Worst E2E: ${round3(worst)}\u00b5s`);
          document.getElementById('ganttTitle').textContent = `GCL Schedule \u2014 Case ${currentCase} (Greedy fallback)`;
        } catch (e2) {
          setStatus(`<span style="color:var(--red);">Error: ${e.message}</span>`);
        }
      } else {
        setStatus(`<span style="color:var(--red);">Error: ${e.message}</span>`);
      }
    }

    btn.disabled = false;
    solving = false;
  }

  /* ═══════ Topology (clean — no badges) ═══════ */
  function renderTopology(model, failedLink, result) {
    const container = document.getElementById('topoContainer');
    container.innerHTML = '';
    xref.nodes = [];
    xref.links = [];

    const rect = container.getBoundingClientRect();
    const W = rect.width || 420;
    const H = rect.height || Math.max(340, W * 0.75);
    const pos = getRealPositions(W, H);
    // ── Front sensors (top row, spread evenly) ──
    pos.RADAR_FLC = { x: W * 0.08, y: H * 0.06 };
    pos.LIDAR_FL  = { x: W * 0.22, y: H * 0.06 };
    pos.LIDAR_FC  = { x: W * 0.38, y: H * 0.06 };
    pos.RADAR_F   = { x: W * 0.50, y: H * 0.06 };
    pos.LIDAR_FR  = { x: W * 0.66, y: H * 0.06 };
    pos.RADAR_FRC = { x: W * 0.82, y: H * 0.06 };
    // ── Switches + BG (middle row) ──
    pos.BG3       = { x: W * 0.08, y: H * 0.34 };
    pos.SW_FL     = { x: W * 0.28, y: H * 0.34 };
    pos.SW_FR     = { x: W * 0.72, y: H * 0.34 };
    pos.BG1       = { x: W * 0.92, y: H * 0.34 };
    pos.SW_REAR   = { x: W * 0.50, y: H * 0.54 };
    // ── Rear sensors (symmetric around center) ──
    pos.RADAR_RLC = { x: W * 0.20, y: H * 0.62 };
    pos.RADAR_RRC = { x: W * 0.80, y: H * 0.62 };
    pos.LIDAR_R   = { x: W * 0.38, y: H * 0.74 };
    pos.BG2       = { x: W * 0.62, y: H * 0.74 };
    pos.ACU_IT    = { x: W * 0.50, y: H * 0.92 };
    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('width', '100%').style('height', '100%')
      .on('click', () => { selectedFlowId = null; selectedSwitchId = null; selectedLinkId = null; clearHighlight(); });

    const topoBase = JSON.parse(JSON.stringify(ROII_REAL_8TC));
    const bgSrcsViz = new Set(baseFlows.filter(f => /^BG\d*$/.test(f.src)).map(f => f.src));
    const bgLinkMapViz = { BG1: 'SW_FR', BG2: 'SW_REAR', BG3: 'SW_FL' };
    for (const bgId of bgSrcsViz) {
      topoBase.nodes.push({ id: bgId, type: 'endstation' });
      const target = bgLinkMapViz[bgId] || 'SW_FR';
      topoBase.links.push({ id: `l_${bgId.toLowerCase()}_${target.toLowerCase().replace('_','')}`, from: bgId, to: target, rate_mbps: 1000, prop_delay_us: 0.3 });
    }
    const backboneIds = new Set(Object.keys(BACKBONE_REVERSE));
    const failedSet = new Set();
    if (failedLink) { failedSet.add(failedLink); const rv = BACKBONE_REVERSE[failedLink]; if (rv) failedSet.add(rv); }
    const drawnBi = new Set();
    const tooltip = document.getElementById('tooltip');

    // Per-link utilization
    const linkUtil = {};
    if (result && result.gcl && result.gcl.links) {
      for (const [lid, ld] of Object.entries(result.gcl.links)) {
        let used = 0;
        for (const e of (ld.entries || [])) {
          if (!e.note.includes('all-gates-closed') && !e.note.includes('non-ST') && e.note !== 'BE (TC0)') used += e.duration_us;
        }
        linkUtil[lid] = round3(used / model.cycle_time_us * 100);
      }
    }

    // Draw links
    for (const lnk of topoBase.links) {
      const p1 = pos[lnk.from], p2 = pos[lnk.to];
      if (!p1 || !p2) continue;
      const isBackbone = backboneIds.has(lnk.id);
      if (isBackbone) {
        const biKey = [lnk.from, lnk.to].sort().join('|');
        if (drawnBi.has(biKey)) continue;
        drawnBi.add(biKey);
      }
      const isFailed = failedSet.has(lnk.id);
      const isGateway = lnk.id === 'l_swrear_acu';
      let color, width, dash;
      if (isFailed) { color = 'rgba(239,68,68,0.6)'; width = 3; dash = '8,5'; }
      else if (isBackbone) { color = 'rgba(59,130,246,0.3)'; width = 2.5; dash = 'none'; }
      else if (isGateway) { color = 'rgba(6,182,212,0.45)'; width = 3; dash = 'none'; }
      else { color = 'rgba(148,163,184,0.35)'; width = 1.5; dash = 'none'; }

      const baseLine = svg.append('line')
        .attr('x1', p1.x).attr('y1', p1.y).attr('x2', p2.x).attr('y2', p2.y)
        .attr('stroke', color).attr('stroke-width', width);
      if (dash !== 'none') baseLine.attr('stroke-dasharray', dash);

      if (!isFailed) {
        if (isBackbone) {
          const revId = BACKBONE_REVERSE[lnk.id];
          xref.links.push({ el: baseLine, lid: lnk.id, baseW: width, baseColor: color });
          if (revId) xref.links.push({ el: baseLine, lid: revId, baseW: width, baseColor: color });
        } else {
          xref.links.push({ el: baseLine, lid: lnk.id, baseW: width, baseColor: color });
        }
      }

      if (isFailed) {
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        svg.append('circle').attr('cx', mx).attr('cy', my).attr('r', 12)
          .attr('fill', 'rgba(239,68,68,0.1)').attr('stroke', '#ef4444').attr('stroke-width', 2);
        svg.append('text').attr('x', mx).attr('y', my + 1)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
          .attr('font-size', '14px').attr('font-weight', '900').attr('fill', '#ef4444').text('\u2716');
      }

      // Link hover
      const util1 = linkUtil[lnk.id] || 0;
      const revLnk = isBackbone ? BACKBONE_REVERSE[lnk.id] : null;
      const util2 = revLnk ? (linkUtil[revLnk] || 0) : 0;
      svg.append('line')
        .attr('x1', p1.x).attr('y1', p1.y).attr('x2', p2.x).attr('y2', p2.y)
        .attr('stroke', 'transparent').attr('stroke-width', 14)
        .style('cursor', 'pointer')
        .on('click', ev => {
          ev.stopPropagation();
          if (!isFailed) toggleLinkHighlight(lnk.id);
        })
        .on('mouseover', () => {
          baseLine.attr('stroke-width', width + 2).attr('stroke', isFailed ? '#ef4444' : '#3b82f6');
          let html = `<div class="tt-title">${lnk.from} \u2194 ${lnk.to}</div>`;
          html += `<div class="tt-row"><span class="tt-k">Speed</span><span class="tt-v">${lnk.rate_mbps} Mbps</span></div>`;
          if (!isFailed) {
            html += `<div class="tt-row"><span class="tt-k">${lnk.from}\u2192${lnk.to}</span><span class="tt-v">${util1}%</span></div>`;
            if (isBackbone) html += `<div class="tt-row"><span class="tt-k">${lnk.to}\u2192${lnk.from}</span><span class="tt-v">${util2}%</span></div>`;
          }
          tooltip.innerHTML = html;
          tooltip.classList.add('show');
        })
        .on('mousemove', ev => { tooltip.style.left = (ev.clientX+14)+'px'; tooltip.style.top = (ev.clientY-20)+'px'; })
        .on('mouseout', () => {
          baseLine.attr('stroke-width', width).attr('stroke', color);
          tooltip.classList.remove('show');
        });
    }

    // Draw nodes — clean circles only
    for (const node of topoBase.nodes) {
      const p = pos[node.id];
      if (!p) continue;
      const BG_COLORS = {
        BG1: { fill: '#fce7f3', stroke: '#ec4899', shortLabel: 'BG1', label: 'BG Small' },
        BG2: { fill: '#fdf2f8', stroke: '#f472b6', shortLabel: 'BG2', label: 'BG Large' },
        BG3: { fill: '#f3e8ff', stroke: '#a855f7', shortLabel: 'BG3', label: 'BG Med' },
      };
      const nc = BG_COLORS[node.id] || ROII_REAL_NODE_COLORS[node.id]
        || { fill: '#e2e8f0', stroke: '#94a3b8', shortLabel: node.id, label: node.id };
      const isSwitch = node.type === 'switch';
      const isACU = node.id === 'ACU_IT';
      const isLidar = node.id.startsWith('LIDAR');
      const isRadar = node.id.startsWith('RADAR');
      const r = isACU ? 24 : isSwitch ? 22 : isLidar ? 19 : 16;

      const sensorFid = xref.sensorFlowMap[node.id];
      let nodeFill, nodeStroke;
      if (sensorFid) {
        const fc = flowColor(sensorFid);
        nodeFill = hexToRgba(fc, 0.15);
        nodeStroke = fc;
      } else {
        nodeFill = nc.fill;
        nodeStroke = nc.stroke;
      }

      const circle = svg.append('circle').attr('cx', p.x).attr('cy', p.y).attr('r', r)
        .attr('fill', nodeFill).attr('stroke', nodeStroke).attr('stroke-width', 2);
      xref.nodes.push({ el: circle, nid: node.id, fid: sensorFid || null, baseR: r, baseFill: nodeFill, baseStroke: nodeStroke });

      svg.append('text').attr('x', p.x).attr('y', p.y + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('font-size', '10px').attr('font-weight', '800').attr('fill', nodeStroke)
        .style('pointer-events', 'none').text(nc.shortLabel);

      svg.append('text').attr('x', p.x).attr('y', p.y + r + 12)
        .attr('text-anchor', 'middle').attr('font-size', '9px').attr('font-weight', '700')
        .attr('fill', '#475569').style('pointer-events', 'none').text(nc.label || node.id);

      // Click hitbox for highlight + hover for tooltip
      svg.append('circle').attr('cx', p.x).attr('cy', p.y).attr('r', r + 4)
        .attr('fill', 'transparent').style('cursor', 'pointer')
        .on('click', ev => {
          ev.stopPropagation();
          if (sensorFid) toggleFlowHighlight(sensorFid);
          else if (isSwitch) toggleSwitchHighlight(node.id);
        })
        .on('mouseover', () => {
          let html = `<div class="tt-title">${nc.label || node.id}</div>`;
          const isBG = node.id.startsWith('BG');
          html += `<div class="tt-row"><span class="tt-k">Type</span><span class="tt-v">${isSwitch ? 'Switch' : isACU ? 'ACU' : isLidar ? 'LiDAR' : isBG ? 'Background' : 'Radar'}</span></div>`;
          if (sensorFid) {
            const f = baseFlows.find(bf => bf.id === sensorFid);
            if (f) html += `<div class="tt-row"><span class="tt-k">PCP</span><span class="tt-v">${f.PCP} (TC${f.PCP})</span></div>`;
          }
          tooltip.innerHTML = html;
          tooltip.classList.add('show');
        })
        .on('mousemove', ev => { tooltip.style.left = (ev.clientX+14)+'px'; tooltip.style.top = (ev.clientY-20)+'px'; })
        .on('mouseout', () => { tooltip.classList.remove('show'); });
    }

    // Draw extra flow nodes — flows from switches (BG) or custom flows not in sensor map
    const extraFlows = baseFlows.filter(f => {
      if (!f.src) return false;
      // Already drawn as a sensor node
      if (xref.sensorFlowMap[f.src] === f.id) return false;
      // Source is a switch or ACU — draw as satellite node
      const srcNode = topoBase.nodes.find(n => n.id === f.src);
      return srcNode && (srcNode.type === 'switch' || f.src === 'ACU_IT');
    });
    const swExtraCount = {};  // track offset index per switch
    for (const ef of extraFlows) {
      const swPos = pos[ef.src];
      if (!swPos) continue;
      const idx = swExtraCount[ef.src] || 0;
      swExtraCount[ef.src] = idx + 1;
      // Spread nodes around the switch
      const angle = -Math.PI/2 + idx * (Math.PI / 4);
      const dist = 34;
      const bx = swPos.x + Math.cos(angle) * dist;
      const by = swPos.y + Math.sin(angle) * dist;
      const br = 10;
      const fColor = ef.color || flowColor(ef.id) || '#a3a3a3';
      const isBG = ef.traffic_type === 'bg' || ef.traffic_type === 'background';
      const label = isBG ? 'BG' : ef.id.replace(/^f_/, '').slice(0, 3).toUpperCase();

      svg.append('line').attr('x1', bx).attr('y1', by).attr('x2', swPos.x).attr('y2', swPos.y)
        .attr('stroke', fColor).attr('stroke-width', 1.5).attr('stroke-dasharray', '3,2').attr('opacity', 0.5);

      const circle = svg.append('circle').attr('cx', bx).attr('cy', by).attr('r', br)
        .attr('fill', hexToRgba(fColor, 0.2)).attr('stroke', fColor).attr('stroke-width', 1.5);

      svg.append('text').attr('x', bx).attr('y', by + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('font-size', '7px').attr('font-weight', '900').attr('fill', fColor)
        .style('pointer-events', 'none').text(label);

      xref.nodes.push({ el: circle, nid: ef.src, fid: ef.id, baseR: br, baseFill: hexToRgba(fColor, 0.2), baseStroke: fColor });

      svg.append('circle').attr('cx', bx).attr('cy', by).attr('r', br + 4)
        .attr('fill', 'transparent').style('cursor', 'pointer')
        .on('click', ev => { ev.stopPropagation(); toggleFlowHighlight(ef.id); });
    }
  }

  /* ═══════ Gantt ═══════ */
  function renderGantt(model, result) {
    const container = document.getElementById('ganttContainer');
    container.innerHTML = '';
    xref.bars = [];
    xref.beBars = [];
    xref.guards = [];

    if (!result || result.error || !result.gcl) return;

    const activeLinks = model.links.filter(l => {
      const entries = result.gcl?.links?.[l.id]?.entries;
      return entries?.some(e => !e.note.includes('non-ST') && !e.note.includes('all-gates-closed') && e.note !== 'BE (TC0)');
    });
    const bgFlows = baseFlows.filter(f => f.traffic_type === 'bg' || f.traffic_type === 'background');
    const bgFlowIds = bgFlows.map(f => f.id);
    const allRowIds = [...activeLinks.map(l => l.id), ...bgFlowIds];
    if (!allRowIds.length) return;

    const W = container.clientWidth || 700;
    const margin = { top: 20, right: 48, bottom: 30, left: 105 };
    const rowH = 28;
    const innerW = W - margin.left - margin.right;
    const innerH = allRowIds.length * rowH;
    const H = margin.top + innerH + margin.bottom;

    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('width', '100%')
      .on('click', () => { selectedFlowId = null; selectedSwitchId = null; selectedLinkId = null; clearHighlight(); });

    const defs = svg.append('defs');
    const gp = defs.append('pattern').attr('id', 'guardH')
      .attr('patternUnits', 'userSpaceOnUse').attr('width', 6).attr('height', 6)
      .attr('patternTransform', 'rotate(45)');
    gp.append('rect').attr('width', 6).attr('height', 6).attr('fill', '#f9a825');
    gp.append('line').attr('x1', 0).attr('y1', 0).attr('x2', 0).attr('y2', 6)
      .attr('stroke', 'rgba(0,0,0,0.2)').attr('stroke-width', 2);

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
    const x = d3.scaleLinear().domain([0, model.cycle_time_us]).range([0, innerW]);
    const y = d3.scaleBand().domain(allRowIds).range([0, innerH]).padding(0.12);

    g.append('g').attr('class', 'gcl-grid')
      .selectAll('line').data(x.ticks(8)).enter().append('line')
      .attr('x1', d => x(d)).attr('x2', d => x(d)).attr('y1', 0).attr('y2', innerH);

    g.append('g').attr('class', 'gcl-axis').attr('transform', `translate(0,${innerH})`)
      .call(d3.axisBottom(x).ticks(8).tickFormat(d => d + '\u00b5s'))
      .selectAll('text').attr('font-size', '10px');

    g.append('g').attr('class', 'gcl-axis')
      .call(d3.axisLeft(y).tickSize(0).tickPadding(6))
      .selectAll('text').text(d => {
        const lnk = model.links.find(l => l.id === d);
        if (lnk) return `${lnk.from} \u2192 ${lnk.to}`;
        return d.replace(/^f_/, '');
      }).attr('font-size', '9.5px')
      .attr('fill', d => bgFlowIds.includes(d) ? '#ec4899' : null)
      .attr('font-weight', d => bgFlowIds.includes(d) ? '800' : null);

    g.selectAll('.rbg').data(allRowIds).enter().append('rect')
      .attr('x', 0).attr('y', d => y(d)).attr('width', innerW).attr('height', y.bandwidth())
      .attr('fill', (d, i) => bgFlowIds.includes(d) ? 'rgba(236,72,153,0.04)' : (i % 2 === 0 ? 'rgba(59,130,246,0.02)' : 'transparent')).attr('rx', 2);

    // Separator line between link rows and BG rows
    if (activeLinks.length > 0 && bgFlowIds.length > 0) {
      const sepY = y(bgFlowIds[0]) - y.step() * y.padding() / 2;
      g.append('line').attr('x1', -8).attr('x2', innerW).attr('y1', sepY).attr('y2', sepY)
        .attr('stroke', 'rgba(236,72,153,0.3)').attr('stroke-width', 1).attr('stroke-dasharray', '4,3');
    }

    const tooltip = document.getElementById('tooltip');
    // Build packet lookup: packet_id → packetRow (for deadline info)
    const pktMap = {};
    if (result.packetRows) for (const p of result.packetRows) pktMap[p.packet_id] = p;

    for (const lnk of activeLinks) {
      const entries = result.gcl.links[lnk.id]?.entries || [];
      let used = 0;
      for (const e of entries) {
        const xPos = x(e.start_us); const actualW = x(e.end_us) - xPos;
        const yPos = y(lnk.id); if (yPos === undefined) continue;
        const bw = y.bandwidth();

        if (e.note === 'guard') {
          const guardEl = g.append('rect').attr('x', xPos).attr('y', yPos)
            .attr('width', Math.max(actualW, 1)).attr('height', bw)
            .attr('fill', 'url(#guardH)').attr('opacity', 0.7).attr('rx', 2);
          xref.guards.push({ el: guardEl });
        } else if (e.note === 'BE (TC0)') {
          const beEl = g.append('rect').attr('x', xPos).attr('y', yPos)
            .attr('width', Math.max(actualW, 1)).attr('height', bw)
            .attr('fill', '#93c5fd').attr('opacity', 0.18).attr('rx', 2);
          xref.beBars.push({ el: beEl });
          if (actualW > 30) {
            g.append('text').attr('class', 'gcl-label')
              .attr('x', xPos + actualW/2).attr('y', yPos + bw/2)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
              .attr('font-size', '8px').attr('fill', 'rgba(59,130,246,0.35)')
              .text('BE');
          }
        } else if (e.note.includes('all-gates-closed') || e.note.includes('non-ST')) {
          // skip
        } else {
          const fid = e.note.split('#')[0];
          const color = flowColor(fid) || '#3b82f6';
          const displayW = Math.max(actualW, 1);

          // Find matching packetRow for deadline info
          const pkt = pktMap[e.note];
          const isMiss = pkt && pkt.deadline_abs_us != null && pkt.end_us > pkt.deadline_abs_us;

          const barEl = g.append('rect').attr('x', xPos).attr('y', yPos)
            .attr('width', displayW).attr('height', bw)
            .attr('fill', color)
            .attr('stroke', isMiss ? '#ef4444' : 'rgba(255,255,255,0.4)')
            .attr('stroke-width', isMiss ? 2 : 0.8)
            .attr('rx', 3).attr('opacity', 0.9);
          if (isMiss) barEl.attr('stroke-dasharray', '4,2');

          let labelEl = null;
          if (actualW > 20) {
            labelEl = g.append('text').attr('class', 'gcl-label')
              .attr('x', xPos + actualW/2).attr('y', yPos + bw/2)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
              .attr('font-size', '9px')
              .text(e.note.replace('#', '.'));
          }

          xref.bars.push({ el: barEl, labelEl, fid, lid: lnk.id });

          // Build tooltip content
          let ttExtra = '';
          if (pkt) {
            const ld = Object.fromEntries(model.links.map(l => [l.id, l]));
            const nodes = [];
            for (const h of pkt.hops) { const ll = ld[h.link_id]; if (ll) { if (!nodes.length) nodes.push(ll.from); nodes.push(ll.to); } }
            const hopPath = nodes.join(' \u2192 ');
            if (hopPath) ttExtra += `<div class="tt-row" style="margin-top:3px;border-top:1px solid var(--border);padding-top:3px;"><span class="tt-k">Path</span><span class="tt-v" style="font-size:0.74rem;">${hopPath}</span></div>`;
            ttExtra += `<div class="tt-row"><span class="tt-k">E2E</span><span class="tt-v">${round3(pkt.e2e_delay_us)}\u00b5s</span></div>`;
            if (pkt.deadline_abs_us != null) {
              const slackColor = isMiss ? '#ef4444' : '#22c55e';
              ttExtra += `<div class="tt-row"><span class="tt-k">Deadline</span><span class="tt-v">${pkt.deadline_abs_us}\u00b5s</span></div>`;
              ttExtra += `<div class="tt-row"><span class="tt-k">Slack</span><span class="tt-v" style="color:${slackColor};font-weight:700">${round3(pkt.slack_us)}\u00b5s</span></div>`;
            }
          }

          const hitW = Math.max(displayW, 8); const hitOff = (hitW - displayW) / 2;
          g.append('rect').attr('x', xPos - hitOff).attr('y', yPos)
            .attr('width', hitW).attr('height', bw)
            .attr('fill', 'transparent').style('cursor', 'pointer')
            .on('click', ev => { ev.stopPropagation(); toggleFlowHighlight(fid); })
            .on('mouseover', () => {
              tooltip.innerHTML = `<div class="tt-title" style="color:${isMiss ? '#ef4444' : color}">${e.note}${isMiss ? ' MISS' : ''}</div>`
                + `<div class="tt-row"><span class="tt-k">Gate</span><span class="tt-v">${e.gate_mask}</span></div>`
                + `<div class="tt-row"><span class="tt-k">Start</span><span class="tt-v">${e.start_us}\u00b5s</span></div>`
                + `<div class="tt-row"><span class="tt-k">End</span><span class="tt-v">${e.end_us}\u00b5s</span></div>`
                + `<div class="tt-row"><span class="tt-k">Duration</span><span class="tt-v">${e.duration_us}\u00b5s</span></div>`
                + ttExtra;
              tooltip.classList.add('show');
            })
            .on('mousemove', ev => { tooltip.style.left = (ev.clientX+12)+'px'; tooltip.style.top = (ev.clientY-20)+'px'; })
            .on('mouseout', () => { tooltip.classList.remove('show'); });

          used += e.duration_us;
        }
      }
      g.append('text').attr('x', innerW + 4).attr('y', y(lnk.id) + y.bandwidth()/2)
        .attr('text-anchor', 'start').attr('dominant-baseline', 'middle')
        .attr('font-size', '9px').attr('fill', '#94a3b8').attr('font-weight', '700')
        .text((used / model.cycle_time_us * 100).toFixed(1) + '%');
    }

    // ── Deadline markers on last hop ──
    if (result.packetRows) {
      for (const pkt of result.packetRows) {
        if (pkt.status === 'NON-ST' || pkt.deadline_abs_us == null) continue;
        if (pkt.deadline_abs_us > model.cycle_time_us) continue;
        const lastHop = pkt.hops[pkt.hops.length - 1];
        if (!lastHop || y(lastHop.link_id) === undefined) continue;
        const dx = x(pkt.deadline_abs_us);
        const ly = y(lastHop.link_id);
        const bw = y.bandwidth();
        g.append('line').attr('x1', dx).attr('x2', dx)
          .attr('y1', ly).attr('y2', ly + bw)
          .attr('stroke', 'rgba(239,68,68,0.4)').attr('stroke-width', 1.5)
          .attr('stroke-dasharray', '3,2');
      }
    }

    // ── BG flow rows ──
    for (const bgFid of bgFlowIds) {
      const bgPkts = (result.packetRows || []).filter(p => p.flow_id === bgFid);
      const color = flowColor(bgFid);
      const yPos = y(bgFid);
      if (yPos === undefined) continue;
      const bw = y.bandwidth();

      for (const pkt of bgPkts) {
        // Only show first hop (originating link from source switch)
        const hop = pkt.hops[0];
        if (!hop) continue;
        const xPos = x(hop.start_us);
        const actualW = x(hop.end_us) - xPos;
        const displayW = Math.max(actualW, 2);

        const barEl = g.append('rect').attr('x', xPos).attr('y', yPos)
          .attr('width', displayW).attr('height', bw)
          .attr('fill', color).attr('stroke', 'rgba(255,255,255,0.5)')
          .attr('stroke-width', 0.8).attr('rx', 3).attr('opacity', 0.9);

        let labelEl = null;
        if (actualW > 18) {
          labelEl = g.append('text').attr('class', 'gcl-label')
            .attr('x', xPos + actualW / 2).attr('y', yPos + bw / 2)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
            .attr('font-size', '8px')
            .text(pkt.packet_id.replace('#', '.'));
        }

        xref.bars.push({ el: barEl, labelEl, fid: bgFid, lid: hop.link_id });

        const hitW = Math.max(displayW, 10);
        const hitOff = (hitW - displayW) / 2;
        const lnk = model.links.find(l => l.id === hop.link_id);
        const linkLabel = lnk ? `${lnk.from} \u2192 ${lnk.to}` : hop.link_id;
        g.append('rect').attr('x', xPos - hitOff).attr('y', yPos)
          .attr('width', hitW).attr('height', bw)
          .attr('fill', 'transparent').style('cursor', 'pointer')
          .on('click', ev => { ev.stopPropagation(); toggleFlowHighlight(bgFid); })
          .on('mouseover', () => {
            tooltip.innerHTML = `<div class="tt-title" style="color:${color}">${pkt.packet_id}</div>`
              + `<div class="tt-row"><span class="tt-k">Link</span><span class="tt-v">${linkLabel}</span></div>`
              + `<div class="tt-row"><span class="tt-k">Start</span><span class="tt-v">${hop.start_us}\u00b5s</span></div>`
              + `<div class="tt-row"><span class="tt-k">End</span><span class="tt-v">${round3(hop.end_us)}\u00b5s</span></div>`
              + `<div class="tt-row"><span class="tt-k">Duration</span><span class="tt-v">${hop.duration_us}\u00b5s</span></div>`;
            tooltip.classList.add('show');
          })
          .on('mousemove', ev => { tooltip.style.left = (ev.clientX + 12) + 'px'; tooltip.style.top = (ev.clientY - 20) + 'px'; })
          .on('mouseout', () => { tooltip.classList.remove('show'); });
      }

      // E2E label on right
      const bgE2E = bgPkts.length ? Math.max(...bgPkts.map(p => p.e2e_delay_us)) : 0;
      g.append('text').attr('x', innerW + 4).attr('y', yPos + bw / 2)
        .attr('text-anchor', 'start').attr('dominant-baseline', 'middle')
        .attr('font-size', '9px').attr('fill', '#ec4899').attr('font-weight', '700')
        .text(round3(bgE2E) + '\u00b5s');
    }

    svg.append('text').attr('x', margin.left).attr('y', margin.top - 6)
      .attr('fill', '#94a3b8').attr('font-size', '9px')
      .text(`Cycle: ${model.cycle_time_us}\u00b5s | Active: ${activeLinks.length}/${model.links.length} links`);
  }

  /* ═══════ E2E Delay Chart (with hover highlight) ═══════ */
  let lastResult = null;
  function renderE2E(model, result) {
    lastResult = result;
    const container = document.getElementById('e2eContainer');
    container.innerHTML = '';
    xref.e2eBars = [];
    if (!result || result.error || !result.packetRows) return;

    const flowE2E = {};
    for (const pkt of result.packetRows) {
      if (pkt.status === 'NON-ST') continue;
      const fid = pkt.flow_id;
      if (!flowE2E[fid] || pkt.e2e_delay_us > flowE2E[fid]) flowE2E[fid] = pkt.e2e_delay_us;
    }
    const entries = baseFlows
      .filter(f => flowE2E[f.id] !== undefined)
      .map(f => ({ fid: f.id, name: f.id.replace(/^f_/,''), e2e: flowE2E[f.id], dl: f.deadline_us || model.cycle_time_us, color: flowColor(f.id) || f.color }));
    if (!entries.length) return;

    const W = container.clientWidth || 400;
    const margin = { top: 6, right: 58, bottom: 20, left: 86 };
    const rowH = 20;
    const innerW = W - margin.left - margin.right;
    const innerH = entries.length * rowH;
    const H = margin.top + innerH + margin.bottom;

    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('width', '100%')
      .on('click', () => { selectedFlowId = null; selectedSwitchId = null; selectedLinkId = null; clearHighlight(); });

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
    const maxVal = Math.max(...entries.map(e => Math.max(e.e2e, e.dl)));
    const x = d3.scaleLinear().domain([0, maxVal * 1.1]).range([0, innerW]);
    const y = d3.scaleBand().domain(entries.map(e => e.fid)).range([0, innerH]).padding(0.2);

    // Deadline markers
    for (const e of entries) {
      g.append('line').attr('x1', x(e.dl)).attr('x2', x(e.dl))
        .attr('y1', y(e.fid)).attr('y2', y(e.fid) + y.bandwidth())
        .attr('stroke', 'rgba(239,68,68,0.35)').attr('stroke-width', 1.5).attr('stroke-dasharray', '3,2');
    }

    // E2E bars — hoverable
    for (const e of entries) {
      const barW = Math.max(x(e.e2e), 2);
      const miss = e.e2e > e.dl;
      const barEl = g.append('rect').attr('class', 'e2e-bar')
        .attr('x', 0).attr('y', y(e.fid))
        .attr('width', barW).attr('height', y.bandwidth())
        .attr('fill', e.color).attr('opacity', miss ? 1 : 0.8).attr('rx', 3)
        .attr('stroke', miss ? '#ef4444' : 'none').attr('stroke-width', miss ? 2 : 0)
        .attr('data-fid', e.fid);

      const labelEl = g.append('text').attr('class', 'e2e-label')
        .attr('x', barW + 4).attr('y', y(e.fid) + y.bandwidth()/2)
        .attr('dominant-baseline', 'central').attr('font-size', '9px')
        .attr('font-weight', '700').attr('fill', miss ? '#ef4444' : '#475569')
        .text(round3(e.e2e) + '\u00b5s');

      xref.e2eBars.push({ el: barEl, labelEl, fid: e.fid });

      // Hit area for click highlight
      g.append('rect').attr('x', 0).attr('y', y(e.fid))
        .attr('width', Math.max(barW, innerW * 0.5)).attr('height', y.bandwidth())
        .attr('fill', 'transparent').style('cursor', 'pointer')
        .on('click', ev => { ev.stopPropagation(); toggleFlowHighlight(e.fid); });
    }

    g.append('g').attr('class', 'gcl-axis')
      .call(d3.axisLeft(y).tickSize(0).tickPadding(4))
      .selectAll('text').text(d => {
        const e = entries.find(en => en.fid === d);
        return e ? e.name : d;
      }).attr('font-size', '9px').attr('font-weight', '600');

    g.append('g').attr('class', 'gcl-axis').attr('transform', `translate(0,${innerH})`)
      .call(d3.axisBottom(x).ticks(5).tickFormat(d => d + '\u00b5s'))
      .selectAll('text').attr('font-size', '9px');
  }

  /* ═══════ Board GCL ═══════ */
  function renderBoardGCL(model, result) {
    const panel = document.getElementById('gclPanel');
    if (!result || result.error || !result.boardConfigs) {
      panel.innerHTML = '<p style="color:var(--text-3);padding:6px;">No GCL data</p>';
      return;
    }
    let html = '';
    for (const sw of ROII_REAL_SWITCHES) {
      const cfg = result.boardConfigs[sw.id];
      if (!cfg) continue;
      html += `<div class="board-section" data-switch-id="${sw.id}"><h3>${sw.label} (${sw.chip})</h3>`;
      for (const [portId, port] of Object.entries(cfg.ports)) {
        html += `<div class="board-port">`;
        html += `<h4>Egress &rarr; ${port.to} <span style="color:var(--text-3);font-weight:400;">(${portId})</span></h4>`;
        const usToNs = v => Math.round(v * 1000);
        const fmtTime = v => `${v} \u00b5s<br><span style="color:var(--text-3);font-size:0.68rem;">${usToNs(v)} ns</span>`;
        html += `<div class="port-meta">Cycle: ${port.cycle_time_us} \u00b5s (${usToNs(port.cycle_time_us)} ns) | Guard: ${port.guard_band_us} \u00b5s (${usToNs(port.guard_band_us)} ns) | Entries: ${port.num_entries}</div>`;
        if (port.pcp_queue_map && port.pcp_queue_map.length) {
          html += `<div class="pcp-map">`;
          for (const m of port.pcp_queue_map) html += `<span class="pcp-badge">PCP ${m.pcp} \u2192 Q${m.queue}</span>`;
          html += `</div>`;
        }
        html += `<table class="gcl-table"><thead><tr><th>#</th><th>Gate Mask</th><th>Start (\u00b5s / ns)</th><th>End (\u00b5s / ns)</th><th>Dur (\u00b5s / ns)</th><th>TC</th><th>Note</th></tr></thead><tbody>`;
        for (const e of port.entries) {
          const bits = e.gate_mask.split('');
          const isGuard = e.note === 'guard';
          const isClosed = e.note === 'all-gates-closed';
          let bitsHtml = '<span class="gate-bits">';
          for (let b = 0; b < 8; b++) {
            const cls = isGuard ? 'guard' : (bits[b] === '1' ? 'open' : 'closed');
            bitsHtml += `<span class="gate-bit ${cls}">${7-b}</span>`;
          }
          bitsHtml += '</span>';
          const isBE = e.note === 'BE (TC0)';
          let tc = '-';
          if (isGuard) tc = 'Guard';
          else if (isClosed) tc = 'Closed';
          else if (isBE) tc = 'TC0 (BE)';
          else if (e.gate_mask === '11111111') tc = 'BE';
          else { const q = e.gate_mask.split('').reverse().indexOf('1'); if (q >= 0) tc = 'TC' + q; }
          const rowFid = (!isGuard && !isClosed && !isBE && e.note) ? e.note.split('#')[0] : '';
          const dataAttr = rowFid ? ` data-flow-id="${rowFid}"` : '';
          html += `<tr${dataAttr}><td>${e.index}</td><td>${bitsHtml}</td><td>${fmtTime(e.start_us)}</td><td>${fmtTime(e.end_us)}</td><td>${fmtTime(e.duration_us)}</td><td>${tc}</td><td>${e.note}</td></tr>`;
        }
        html += `</tbody></table></div>`;
      }
      html += `</div>`;
    }
    panel.innerHTML = html;
  }

  /* ═══════ GCL Export ═══════ */
  function exportGCL() {
    if (!lastResult || !lastResult.boardConfigs) return;
    const json = JSON.stringify(lastResult.boardConfigs, null, 2);
    navigator.clipboard.writeText(json).then(() => {
      const btn = document.getElementById('btnExportGCL');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.style.color = '#22c55e';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
    });
  }

  /* ═══════ Compare Mode ═══════ */
  function runCompare() {
    setStatus('<span class="spinner-sm"></span> Loading both cases for comparison...');
    // Build models for both cases
    const saved = baseFlows;
    baseFlows = initFlows(1);
    syncColors(); buildSensorFlowMap();
    const model1 = buildModel();
    const result1 = loadProfile(CASE1_PROFILE, model1);

    baseFlows = initFlows(2);
    syncColors(); buildSensorFlowMap();
    const model2 = buildModel();
    const result2 = loadProfile(CASE2_PROFILE, model2);

    baseFlows = saved;

    updateCompareMetrics(result1, result2);
    renderGanttCompare(model1, result1, model2, result2);
    renderE2ECompare(model1, result1, model2, result2);

    setStatus('\u2713 <strong>Compare</strong> | Case 1 vs Case 2 (pre-computed ILP optimal)');
  }

  function updateCompareMetrics(result1, result2) {
    function getMetrics(result) {
      const stPkts = result.packetRows.filter(p => p.status !== 'NON-ST');
      const worst = stPkts.length ? Math.max(...stPkts.map(p => p.e2e_delay_us)) : 0;
      const missCount = stPkts.filter(p => p.status === 'MISS').length;
      return {
        util: result.worst_util_percent,
        stPkts: stPkts.length,
        worst: round3(worst),
        missCount,
        status: missCount === 0 ? 'ALL OK' : `${missCount} MISS`,
        info: result.method || 'ILP optimal'
      };
    }
    const m1 = getMetrics(result1), m2 = getMetrics(result2);

    // Utilization — lower is better
    document.getElementById('cmp1Util').textContent = m1.util + '%';
    document.getElementById('cmp2Util').textContent = m2.util + '%';
    document.getElementById('cmp1Util').className = 'cm-value ' + (m1.util <= m2.util ? 'cm-better' : 'cm-worse');
    document.getElementById('cmp2Util').className = 'cm-value ' + (m2.util <= m1.util ? 'cm-better' : 'cm-worse');

    // ST Packets
    document.getElementById('cmp1Pkts').textContent = m1.stPkts;
    document.getElementById('cmp2Pkts').textContent = m2.stPkts;

    // Worst E2E — lower is better
    document.getElementById('cmp1E2E').textContent = m1.worst + '\u00b5s';
    document.getElementById('cmp2E2E').textContent = m2.worst + '\u00b5s';
    document.getElementById('cmp1E2E').className = 'cm-value ' + (m1.worst <= m2.worst ? 'cm-better' : 'cm-worse');
    document.getElementById('cmp2E2E').className = 'cm-value ' + (m2.worst <= m1.worst ? 'cm-better' : 'cm-worse');

    // Status
    document.getElementById('cmp1Status').innerHTML = m1.missCount === 0
      ? '<span style="color:var(--green);font-weight:700;">ALL OK</span>'
      : `<span style="color:var(--red);font-weight:700;">${m1.missCount} MISS</span>`;
    document.getElementById('cmp2Status').innerHTML = m2.missCount === 0
      ? '<span style="color:var(--green);font-weight:700;">ALL OK</span>'
      : `<span style="color:var(--red);font-weight:700;">${m2.missCount} MISS</span>`;

    // ILP info
    document.getElementById('cmp1ILP').textContent = m1.info;
    document.getElementById('cmp2ILP').textContent = m2.info;
  }

  function renderGanttCompare(model1, result1, model2, result2) {
    const container = document.getElementById('ganttContainer');
    container.innerHTML = '';
    xref.bars = []; xref.beBars = []; xref.guards = [];
    document.getElementById('ganttTitle').textContent = 'GCL Schedule — Compare';

    if (!result1 || !result2) return;

    function getActiveLinks(model, result) {
      return model.links.filter(l => {
        const entries = result.gcl?.links?.[l.id]?.entries;
        return entries?.some(e => !e.note.includes('non-ST') && !e.note.includes('all-gates-closed') && e.note !== 'BE (TC0)');
      });
    }

    const links1 = getActiveLinks(model1, result1);
    const links2 = getActiveLinks(model2, result2);
    if (!links1.length && !links2.length) return;

    const W = container.clientWidth || 700;
    const margin = { top: 20, right: 48, bottom: 30, left: 105 };
    const rowH = 22;
    const labelH = 24;
    const dividerH = 8;
    const rows1 = links1.length;
    const rows2 = links2.length;
    const innerW = W - margin.left - margin.right;
    const innerH = (rows1 + rows2) * rowH + labelH * 2 + dividerH;
    const H = margin.top + innerH + margin.bottom;
    const cycleMax = Math.max(model1.cycle_time_us, model2.cycle_time_us);

    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('width', '100%');

    const defs = svg.append('defs');
    const gp = defs.append('pattern').attr('id', 'guardHC')
      .attr('patternUnits', 'userSpaceOnUse').attr('width', 6).attr('height', 6)
      .attr('patternTransform', 'rotate(45)');
    gp.append('rect').attr('width', 6).attr('height', 6).attr('fill', '#f9a825');
    gp.append('line').attr('x1', 0).attr('y1', 0).attr('x2', 0).attr('y2', 6)
      .attr('stroke', 'rgba(0,0,0,0.2)').attr('stroke-width', 2);

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
    const x = d3.scaleLinear().domain([0, cycleMax]).range([0, innerW]);

    // ── Case 1 section ──
    let yOff = 0;
    g.append('text').attr('x', 0).attr('y', yOff + 14)
      .attr('font-size', '11px').attr('font-weight', '800').attr('fill', 'var(--blue)')
      .text('Case 1 (Standard — ILP optimal)');
    yOff += labelH;

    const ids1 = links1.map(l => l.id);
    const y1 = d3.scaleBand().domain(ids1).range([yOff, yOff + rows1 * rowH]).padding(0.12);
    renderGanttSection(g, x, y1, model1, result1, links1, innerW);

    // ── Divider ──
    yOff += rows1 * rowH;
    g.append('line').attr('x1', -8).attr('x2', innerW + 40)
      .attr('y1', yOff + dividerH / 2).attr('y2', yOff + dividerH / 2)
      .attr('stroke', 'var(--border)').attr('stroke-width', 2);
    yOff += dividerH;

    // ── Case 2 section ──
    g.append('text').attr('x', 0).attr('y', yOff + 14)
      .attr('font-size', '11px').attr('font-weight', '800').attr('fill', 'var(--cyan)')
      .text('Case 2 (Heavy — ILP optimal)');
    yOff += labelH;

    const ids2 = links2.map(l => l.id);
    const y2 = d3.scaleBand().domain(ids2).range([yOff, yOff + rows2 * rowH]).padding(0.12);
    renderGanttSection(g, x, y2, model2, result2, links2, innerW);

    // ── Shared x-axis ──
    g.append('g').attr('class', 'gcl-axis').attr('transform', `translate(0,${yOff + rows2 * rowH})`)
      .call(d3.axisBottom(x).ticks(8).tickFormat(d => d + '\u00b5s'))
      .selectAll('text').attr('font-size', '10px');
  }

  function renderGanttSection(g, x, y, model, result, activeLinks, innerW) {
    // Grid lines
    g.selectAll(null).data(x.ticks(8)).enter().append('line')
      .attr('x1', d => x(d)).attr('x2', d => x(d))
      .attr('y1', y.range()[0]).attr('y2', y.range()[1])
      .attr('stroke', 'rgba(59,130,246,0.05)').attr('stroke-width', 1);

    // Y-axis labels
    const allIds = activeLinks.map(l => l.id);
    for (const lid of allIds) {
      const lnk = model.links.find(l => l.id === lid);
      const label = lnk ? `${lnk.from} \u2192 ${lnk.to}` : lid;
      g.append('text').attr('x', -6).attr('y', y(lid) + y.bandwidth() / 2)
        .attr('text-anchor', 'end').attr('dominant-baseline', 'central')
        .attr('font-size', '9px').attr('fill', 'var(--text-2)').text(label);
    }

    // Row backgrounds
    activeLinks.forEach((lnk, i) => {
      g.append('rect').attr('x', 0).attr('y', y(lnk.id))
        .attr('width', innerW).attr('height', y.bandwidth())
        .attr('fill', i % 2 === 0 ? 'rgba(59,130,246,0.02)' : 'transparent').attr('rx', 2);
    });

    const tooltip = document.getElementById('tooltip');
    const pktMap = {};
    if (result.packetRows) for (const p of result.packetRows) pktMap[p.packet_id] = p;

    for (const lnk of activeLinks) {
      const entries = result.gcl.links[lnk.id]?.entries || [];
      let used = 0;
      for (const e of entries) {
        const xPos = x(e.start_us); const actualW = x(e.end_us) - xPos;
        const yPos = y(lnk.id); if (yPos === undefined) continue;
        const bw = y.bandwidth();

        if (e.note === 'guard') {
          g.append('rect').attr('x', xPos).attr('y', yPos)
            .attr('width', Math.max(actualW, 1)).attr('height', bw)
            .attr('fill', 'url(#guardHC)').attr('opacity', 0.7).attr('rx', 2);
        } else if (e.note === 'BE (TC0)') {
          g.append('rect').attr('x', xPos).attr('y', yPos)
            .attr('width', Math.max(actualW, 1)).attr('height', bw)
            .attr('fill', '#93c5fd').attr('opacity', 0.14).attr('rx', 2);
        } else if (e.note.includes('all-gates-closed') || e.note.includes('non-ST')) {
          // skip
        } else {
          const fid = e.note.split('#')[0];
          const color = flowColor(fid) || '#3b82f6';
          const displayW = Math.max(actualW, 1);
          const pkt = pktMap[e.note];
          const isMiss = pkt && pkt.deadline_abs_us != null && pkt.end_us > pkt.deadline_abs_us;

          g.append('rect').attr('x', xPos).attr('y', yPos)
            .attr('width', displayW).attr('height', bw)
            .attr('fill', color).attr('stroke', isMiss ? '#ef4444' : 'rgba(255,255,255,0.4)')
            .attr('stroke-width', isMiss ? 2 : 0.8).attr('rx', 3).attr('opacity', 0.9);

          if (actualW > 16) {
            g.append('text').attr('class', 'gcl-label')
              .attr('x', xPos + actualW / 2).attr('y', yPos + bw / 2)
              .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
              .attr('font-size', '8px').text(e.note.replace('#', '.'));
          }

          // Tooltip hitbox
          const hitW = Math.max(displayW, 6);
          g.append('rect').attr('x', xPos).attr('y', yPos)
            .attr('width', hitW).attr('height', bw)
            .attr('fill', 'transparent').style('cursor', 'pointer')
            .on('mouseover', () => {
              let html = `<div class="tt-title" style="color:${color}">${e.note}</div>`;
              html += `<div class="tt-row"><span class="tt-k">Start</span><span class="tt-v">${e.start_us}\u00b5s</span></div>`;
              html += `<div class="tt-row"><span class="tt-k">End</span><span class="tt-v">${e.end_us}\u00b5s</span></div>`;
              html += `<div class="tt-row"><span class="tt-k">Duration</span><span class="tt-v">${e.duration_us}\u00b5s</span></div>`;
              if (pkt) html += `<div class="tt-row"><span class="tt-k">E2E</span><span class="tt-v">${round3(pkt.e2e_delay_us)}\u00b5s</span></div>`;
              tooltip.innerHTML = html;
              tooltip.classList.add('show');
            })
            .on('mousemove', ev => { tooltip.style.left = (ev.clientX + 12) + 'px'; tooltip.style.top = (ev.clientY - 20) + 'px'; })
            .on('mouseout', () => { tooltip.classList.remove('show'); });

          used += e.duration_us;
        }
      }
      // Utilization label
      g.append('text').attr('x', innerW + 4).attr('y', y(lnk.id) + y.bandwidth() / 2)
        .attr('text-anchor', 'start').attr('dominant-baseline', 'middle')
        .attr('font-size', '9px').attr('fill', '#94a3b8').attr('font-weight', '700')
        .text((used / model.cycle_time_us * 100).toFixed(1) + '%');
    }
  }

  function renderE2ECompare(model1, result1, model2, result2) {
    const container = document.getElementById('e2eContainer');
    container.innerHTML = '';
    xref.e2eBars = [];

    function getFlowE2E(result, flows) {
      const flowE2E = {};
      for (const pkt of (result.packetRows || [])) {
        if (pkt.status === 'NON-ST') continue;
        if (!flowE2E[pkt.flow_id] || pkt.e2e_delay_us > flowE2E[pkt.flow_id]) flowE2E[pkt.flow_id] = pkt.e2e_delay_us;
      }
      return flows
        .filter(f => flowE2E[f.id] !== undefined)
        .map(f => ({ fid: f.id, name: f.id.replace(/^f_/, ''), e2e: flowE2E[f.id], color: flowColor(f.id) || f.color }));
    }

    const flows1 = initFlows(1).filter(f => f.deadline_us != null);
    const flows2 = initFlows(2).filter(f => f.deadline_us != null);
    const e1 = getFlowE2E(result1, flows1);
    const e2 = getFlowE2E(result2, flows2);

    // Merge all flow IDs (union)
    const allFids = [...new Set([...e1.map(e => e.fid), ...e2.map(e => e.fid)])];
    if (!allFids.length) return;

    const W = container.clientWidth || 400;
    const margin = { top: 6, right: 58, bottom: 20, left: 86 };
    const rowH = 24;
    const innerW = W - margin.left - margin.right;
    const innerH = allFids.length * rowH;
    const H = margin.top + innerH + margin.bottom;

    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('width', '100%');

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

    const maxVal = Math.max(
      ...e1.map(e => e.e2e), ...e2.map(e => e.e2e), 10
    );
    const x = d3.scaleLinear().domain([0, maxVal * 1.15]).range([0, innerW]);
    const y = d3.scaleBand().domain(allFids).range([0, innerH]).padding(0.25);

    const barH = y.bandwidth() / 2 - 1;
    const map1 = Object.fromEntries(e1.map(e => [e.fid, e]));
    const map2 = Object.fromEntries(e2.map(e => [e.fid, e]));

    for (const fid of allFids) {
      const yBase = y(fid);
      const color = flowColor(fid);
      // Case 1 bar (top half)
      if (map1[fid]) {
        const bw = Math.max(x(map1[fid].e2e), 2);
        g.append('rect').attr('x', 0).attr('y', yBase)
          .attr('width', bw).attr('height', barH)
          .attr('fill', color).attr('opacity', 0.85).attr('rx', 2);
        g.append('text').attr('x', bw + 3).attr('y', yBase + barH / 2)
          .attr('dominant-baseline', 'central').attr('font-size', '8px')
          .attr('font-weight', '600').attr('fill', 'var(--blue)')
          .text(round3(map1[fid].e2e) + '\u00b5s');
      }
      // Case 2 bar (bottom half)
      if (map2[fid]) {
        const bw = Math.max(x(map2[fid].e2e), 2);
        g.append('rect').attr('x', 0).attr('y', yBase + barH + 2)
          .attr('width', bw).attr('height', barH)
          .attr('fill', color).attr('opacity', 0.5).attr('rx', 2)
          .attr('stroke', 'var(--cyan)').attr('stroke-width', 1);
        g.append('text').attr('x', bw + 3).attr('y', yBase + barH + 2 + barH / 2)
          .attr('dominant-baseline', 'central').attr('font-size', '8px')
          .attr('font-weight', '600').attr('fill', 'var(--cyan)')
          .text(round3(map2[fid].e2e) + '\u00b5s');
      }
    }

    g.append('g').attr('class', 'gcl-axis')
      .call(d3.axisLeft(y).tickSize(0).tickPadding(4))
      .selectAll('text').text(d => d.replace(/^f_/, '')).attr('font-size', '9px').attr('font-weight', '600');

    g.append('g').attr('class', 'gcl-axis').attr('transform', `translate(0,${innerH})`)
      .call(d3.axisBottom(x).ticks(5).tickFormat(d => d + '\u00b5s'))
      .selectAll('text').attr('font-size', '9px');

    // Legend
    svg.append('rect').attr('x', margin.left).attr('y', 1).attr('width', 8).attr('height', 5).attr('fill', 'var(--blue)').attr('rx', 1);
    svg.append('text').attr('x', margin.left + 11).attr('y', 6).attr('font-size', '8px').attr('fill', 'var(--blue)').attr('font-weight', '700').text('Case 1');
    svg.append('rect').attr('x', margin.left + 52).attr('y', 1).attr('width', 8).attr('height', 5).attr('fill', 'var(--cyan)').attr('rx', 1).attr('stroke', 'var(--cyan)').attr('stroke-width', 1).attr('opacity', 0.5);
    svg.append('text').attr('x', margin.left + 63).attr('y', 6).attr('font-size', '8px').attr('fill', 'var(--cyan)').attr('font-weight', '700').text('Case 2');
  }

  /* ═══════ Events ═══════ */
  const autoSolve = () => { if (compareMode) { runCompare(); } else { renderFlowTable(); solve(); } };
  document.getElementById('btnSolve').addEventListener('click', () => { renderFlowTable(); solve(true); });
  document.getElementById('pSpeed').addEventListener('change', autoSolve);
  document.getElementById('pCycle').addEventListener('change', autoSolve);
  document.getElementById('pGuard').addEventListener('change', autoSolve);
  document.getElementById('pDelay').addEventListener('change', autoSolve);
  document.getElementById('pFail').addEventListener('change', autoSolve);
  document.getElementById('btnExportGCL').addEventListener('click', exportGCL);

  /* ═══════ Profile Switch ═══════ */
  let compareMode = false;

  function switchCase(caseNum) {
    // Update button active state
    document.getElementById('btnCase1').classList.toggle('active', caseNum === 1);
    document.getElementById('btnCase2').classList.toggle('active', caseNum === 2);
    document.getElementById('btnCompare').classList.toggle('active', caseNum === 'compare');

    if (caseNum === 'compare') {
      if (compareMode) return;
      compareMode = true;
      currentCase = 'compare';
      document.getElementById('topoContainer').parentElement.style.display = 'none';
      document.getElementById('flowSection').style.display = 'none';
      document.getElementById('boardSection').style.display = 'none';
      document.getElementById('comparePanel').style.display = '';
      document.getElementById('e2eSection').style.display = '';
      runCompare();
      return;
    }
    compareMode = false;
    if (currentCase === caseNum) return;
    currentCase = caseNum;
    document.getElementById('topoContainer').parentElement.style.display = '';
    document.getElementById('flowSection').style.display = '';
    document.getElementById('boardSection').style.display = '';
    document.getElementById('comparePanel').style.display = 'none';
    baseFlows = initFlows(caseNum);
    renderFlowTable();
    solve();
  }
  document.getElementById('btnCase1').addEventListener('click', () => switchCase(1));
  document.getElementById('btnCase2').addEventListener('click', () => switchCase(2));
  document.getElementById('btnCompare').addEventListener('click', () => switchCase('compare'));

  document.getElementById('btnAddFlow').addEventListener('click', () => {
    addCounter++;
    baseFlows.push({
      id: `f_custom_${addCounter}`, PCP: 0, payload_bytes: 1500,
      period_us: 500, deadline_us: 500, traffic_type: 'radar',
      src: 'SW_FL', dst: 'ACU_IT', k_paths: 1,
      color: CUSTOM_COLORS[(addCounter - 1) % CUSTOM_COLORS.length]
    });
    renderFlowTable();
  });

  /* ═══════ Solver info toggle + tooltip ═══════ */
  const solverSel = document.getElementById('pSolver');
  const solverInfo = document.getElementById('solverInfo');
  solverSel.addEventListener('change', () => {
    solverInfo.style.display = solverSel.value === 'greedy' ? '' : 'none';
  });
  solverInfo.addEventListener('mouseenter', (ev) => {
    const tip = document.getElementById('tooltip');
    tip.innerHTML = '<b>Greedy 정렬 기준</b> (다단계 정렬 1회)<br>'
      + '1차: PCP 높은 패킷 먼저 배치<br>'
      + '2차: PCP 동일 → 릴리스 빠른 순<br>'
      + '3차: 그래도 동일 → 데드라인 짧은 순 (EDF)';
    const r = ev.target.getBoundingClientRect();
    Object.assign(tip.style, {
      display: 'block', position: 'fixed',
      left: r.left + 'px', top: (r.bottom + 6) + 'px',
      background: '#1e293b', color: '#f1f5f9',
      padding: '8px 12px', borderRadius: '6px',
      fontSize: '12px', lineHeight: '1.6',
      zIndex: '9999', maxWidth: '300px',
      boxShadow: '0 4px 12px rgba(0,0,0,0.3)', pointerEvents: 'none'
    });
  });
  solverInfo.addEventListener('mouseleave', () => {
    document.getElementById('tooltip').style.display = 'none';
  });

  /* ═══════ Init ═══════ */
  renderFlowTable();
  solve().then(() => ensureGLPK());
  </script>
</body>
</html>
